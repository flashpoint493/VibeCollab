content: |
  ## 问题背景

  随着项目发展，用户需要自定义 project.yaml 的字段：
  - 不同领域有不同的配置需求
  - 用户可能想添加自定义元数据
  - 需要保持向后兼容性

  直接访问配置字段会导致：
  - 缺少默认值支持
  - 容错能力差
  - 难以扩展

  ## 解决方案：配置适配器模式

  ### 核心设计

  ```python
  class ProjectAdapter:
      """项目配置适配器"""

      def __init__(self, config: dict):
          self.config = config

      def get(self, path: str, default=None):
          """安全获取字段，支持点路径"""
          parts = path.split('.')
          value = self.config
          for part in parts:
              if not isinstance(value, dict):
                  return default
              value = value.get(part)
          return value if value is not None else default

      def get_role(self, code: str) -> dict:
          """获取角色，支持内置默认"""
          roles = self.config.get('roles', [])
          for role in roles:
              if role.get('code') == code:
                  return role
          return self._get_default_role(code)
  ```

  ### 优势

  1. **容错性**
     - 字段不存在时返回默认值
     - 不会因缺少字段而崩溃

  2. **向后兼容**
     - 旧配置仍可工作
     - 新字段可选

  3. **可扩展性**
     - 支持自定义字段
     - 不破坏现有结构

  4. **易测试**
     - 可以mock适配器
     - 隔离配置逻辑

  ## 使用示例

  ### 模板中使用

  ❌ 不安全的直接访问：
  ```jinja2
  {# 可能失败 #}
  {{ project.philosophy.vibe_development.enabled }}
  ```

  ✅ 使用适配器：
  ```jinja2
  {# 安全，提供默认值 #}
  {{ adapter.get('philosophy.vibe_development.enabled', false) }}
  ```

  ### 代码中使用

  ❌ 直接访问：
  ```python
  enabled = config['philosophy']['vibe_development']['enabled']
  # KeyError if missing
  ```

  ✅ 使用适配器：
  ```python
  enabled = adapter.get('philosophy.vibe_development.enabled', False)
  # Safe
  ```

  ## 字段分类策略

  ### 必需字段 (Protocol Required)

  这些字段必须存在，否则无法运行：

  ```python
  REQUIRED_FIELDS = {
      'project.name',
      'project.version',
      'project.domain',
  }

  def _validate_required(self):
      missing = []
      for field in self.REQUIRED_FIELDS:
          if not self.get(field):
              missing.append(field)
      if missing:
          raise ValueError(f"缺少必需字段: {', '.join(missing)}")
  ```

  ### 推荐字段 (Core Strongly Recommended)

  提供默认值，但强烈建议配置：

  ```python
  DEFAULT_ROLES = {
      'DESIGN': {
          'name': '协议设计',
          'focus': ['Schema设计', '协议演进'],
      },
      # ...
  }

  def get_role(self, code: str) -> dict:
      # 先查用户配置，再查默认
      if user_role := self._find_user_role(code):
          return user_role
      return DEFAULT_ROLES.get(code, {})
  ```

  ### 自定义字段 (Fully Customizable)

  任意扩展，无限制：

  ```python
  def get_custom(self, key: str, default=None):
      """获取自定义字段"""
      return self.get(f'custom.{key}', default)
  ```

  用户配置：
  ```yaml
  custom:
    company: "Acme Corp"
    team_size: 10
    sprint_days: 14
  ```

  使用：
  ```python
  company = adapter.get_custom('company', 'Unknown')
  team_size = adapter.get_custom('team_size', 5)
  ```

  ## 实现步骤

  ### 步骤 1: 创建适配器

  ```python
  # src/vibecollab/project_adapter.py

  class ProjectAdapter:
      REQUIRED_FIELDS = {...}
      DEFAULT_ROLES = {...}

      def __init__(self, config: dict):
          self.config = config
          self._validate_required()

      def get(self, path: str, default=None):
          # 实现点路径解析
          pass

      def get_role(self, code: str) -> dict:
          # 实现角色获取
          pass

      def get_custom(self, key: str, default=None):
          # 实现自定义字段获取
          pass
  ```

  ### 步骤 2: 集成到 Pattern Engine

  ```python
  class PatternEngine:
      def render(self, config: dict):
          adapter = ProjectAdapter(config)

          context = {
              'project': config,
              'adapter': adapter,
              'custom': config.get('custom', {}),
          }

          return self.template.render(context)
  ```

  ### 步骤 3: 更新所有模板

  将直接访问改为适配器访问：

  ```jinja2
  {# 之前 #}
  {{ project.philosophy.vibe_development.enabled }}

  {# 之后 #}
  {{ adapter.get('philosophy.vibe_development.enabled', false) }}
  ```

  ### 步骤 4: 添加验证命令

  ```bash
  vibecollab validate config
  ```

  输出：
  ```
  ✅ 项目配置验证通过

  必需字段: 全部通过
    ✓ project.name
    ✓ project.version
    ✓ project.domain

  推荐字段: 3/5 通过
    ✓ roles
    ✓ philosophy
    ✓ lifecycle
    ⚠ 缺少: decision_quality (使用默认值)
    ⚠ 缺少: llm_client (需要配置)

  自定义字段: 3 个
    ✓ custom.company
    ✓ custom.team_size
    ✓ custom.sprint_days
  ```

  ## 最佳实践

  1. **渐进式迁移**
     - 不一次性改所有模板
     - 逐个更新，逐步测试

  2. **向后兼容**
     - 保留直接访问支持
     - 逐步切换到适配器

  3. **文档更新**
     - 说明新的字段分类
     - 提供迁移指南

  4. **错误提示**
     - 缺少必需字段时给出明确错误
     - 推荐字段缺少时给出警告

  ## 反例

  某项目直接访问配置：
  ```python
  name = config['project']['name']
  version = config['project']['version']
  domain = config['project']['domain']
  # 如果缺少任何一个就会崩溃
  ```

  ## 正例

  使用适配器：
  ```python
  adapter = ProjectAdapter(config)
  name = adapter.get('project.name')
  version = adapter.get('project.version')
  domain = adapter.get('project.domain')
  # 缺少时会使用默认值或报明确错误
  ```

  ## 相关 Insight

  - INS-011: 避免过度设计
  - INS-003: 配置管理最佳实践

  ## 总结

  > **适配器模式是配置扩展性的关键**

  - 提供容错和默认值
  - 支持向后兼容
  - 允许用户自定义
  - 不破坏现有结构

  ## 使用建议

  当你需要：
  - 支持用户自定义配置
  - 保持向后兼容性
  - 提供容错能力
  → 使用适配器模式

