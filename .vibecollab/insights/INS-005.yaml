id: INS-005
title: 'Pattern Engine: Manifest-Driven Jinja2 Template System'
summary: Declarative document generation architecture
tags:
- pattern-engine
- templates
- jinja2
- code-generation
- manifest
category: decision
body:
  scenario: Replacing hardcoded generation methods with maintainable template system
  approach: Use manifest.yaml + Jinja2 templates + local override mechanism. Each
    section is an independent .md.j2 template. manifest.yaml defines section order,
    conditions, template mapping. Template Overlay allows customization in .vibecollab/patterns/.
    Reduces generator.py from 1713 to 83 lines
