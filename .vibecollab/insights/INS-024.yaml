body:
  scenario: 'Defining project phases: prototype, demo, production with different constraints'
  approach: 'Stages: (1) Prototype - explore feasibility, no tests (2) Demo - working
    features, no edge cases, manual testing (3) Production - full QA, CI/CD, documentation.
    Place in ROADMAP.md (PM-focused), not CONTRIBUTING_AI.md. Stage transitions are
    strategic decisions'
