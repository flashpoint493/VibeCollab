category: technique
body:
  scenario: Implementing time-based decay and usage-based reward for Insight relevance
  approach: 'Settings: decay_rate=0.95, decay_interval_days=30, use_reward=0.1, deactivate_threshold=0.1.
    Formula: weight *= decay_rate periodically. Reward: weight += use_reward on each
    use. Deactivation: weight < threshold → active=false. Reactivation: use sets active=true.
    Prevents stale knowledge accumulation'
