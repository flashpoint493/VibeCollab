category: decision
body:
  scenario: How to support multiple developers/agents collaborating without conflicts
  approach: 'Use Option C: Independent developer contexts (docs/developers/{role}/CONTEXT.md)
    + global auto-aggregation (docs/CONTEXT.md). Benefits: isolation per developer,
    global view for coordination, extensible for new developers, backward compatible.
    Identity via git config user.name. Collaboration tracked in COLLABORATION.md'
