body:
  scenario: Abstracting different host communication mechanisms for workflow automation
  approach: 'HostAdapter protocol: send(message) → HostResponse + close(). Three implementations:
    (1) FileExchangeAdapter - file polling with IDE AI via instruction.md/response.md
    markers (2) SubprocessAdapter - stdin/stdout CLI tools (aider, etc.) (3) AutoAdapter
    - keyboard simulation for IDE. Unified interface, pluggable backends'
