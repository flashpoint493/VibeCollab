kind: insight
version: '1'
id: INS-037
title: 'VibeCollab --help 工作流最佳实践'
summary: 系统化的 AI 协作推进模式，遵循 task-insight 循环迭代、及时 git 同步和文档更新
tags:
- workflow
- best-practice
- git-sync
- documentation
- task-insight-cycle
category: workflow
body:
  scenario: 当使用 vibecollab 推进项目时，需要系统化的 workflow 来确保持续进展和知识积累
  approach: |
    1. **状态检查**: 
       - `vibecollab task list` 查看待办任务
       - `git status` 检查未同步变更
       - `vibecollab insight status` 检查 Insight 系统
    
    2. **Task-Insight 循环**:
       - 选择优先级最高的任务 (TASK-DEV-028 等)
       - 使用 `vibecollab task suggest <task>` 获取相关 Insight
       - 执行任务并记录实践洞察
       - 完成后创建新 Insight 记录经验
    
    3. **Git 同步**:
       - 每次 Insight 创建后立即 `git add -A`
       - 使用 conventional commit 格式提交
       - 及时 `git push` 同步到远程
    
    4. **文档更新**:
       - 更新 CHANGELOG.md 记录变更
       - 更新 ROADMAP.md 调整里程碑
       - 更新 skill.md 分享最佳实践
       - 使用 `vibecollab index` 重建索引
    
    5. **迭代推进**:
       - 标记完成的任务
       - 启动下一个任务
       - 持续循环积累
  validation: |
    - 每个任务都有相关的 Insight 支持
    - 所有变更都有对应的 git commit
    - 文档与代码变更同步更新
    - Insight weight 通过使用自然提升
  artifacts:
    - .vibecollab/insights/INS-036.yaml (Release Engineering)
    - .vibecollab/insights/INS-037.yaml (本文件)
    - docs/CHANGELOG.md
    - docs/ROADMAP.md
