category: technique
body:
  scenario: 'Managing configuration with precedence: Environment > Config File > Defaults'
  approach: 'Layers: (1) Environment variables (VIBECOLLAB_*) (2) Config file (~/.vibecollab/config.yaml)
    (3) Default values. CLI: config setup (interactive wizard), config show, config
    set, config path. LLMConfig, AgentConfig use same pattern. No secrets in code,
    use env vars'
