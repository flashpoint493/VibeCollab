title: 'Git Hooks Framework CLI: install/uninstall/run Commands'
summary: Complete implementation of FP-001 Git Hooks Framework with CLI commands for hook management and execution
tags:
- git-hooks
- cli
- automation
- fp-001
- dev-025
category: workflow
body:
  scenario: Pre-commit hook is manually created. Need proper CLI commands to manage hooks (install/uninstall/run) and configure hook types via project.yaml.
  approach: |
    1. Hook Manager Module:
       - HookManager class to handle hook lifecycle
       - Support hook types: pre-commit, pre-push, post-commit, post-checkout
       - Hook scripts stored in .vibecollab/hooks/ as templates
       - Install to .git/hooks/ with proper permissions
    
    2. CLI Commands:
       - vibecollab hooks install [--type pre-commit] [--force]
       - vibecollab hooks uninstall [--type pre-commit] [--all]
       - vibecollab hooks run <type> [--verbose]
       - vibecollab hooks status [--json]
       - vibecollab hooks list
    
    3. Configuration (project.yaml):
       hooks:
         enabled: true
         hooks_dir: .vibecollab/hooks
         rules:
           pre-commit:
             - vibecollab check
             - vibecollab insight check
           pre-push:
             - pytest tests/
             - vibecollab check
    
    4. Hook Script Template:
       #!/bin/bash
       # Generated by vibecollab hooks install
       # Commands from project.yaml hooks.rules.<type>
       
       echo "Running vibecollab pre-commit checks..."
       vibecollab check || exit 1
    
    5. Cross-Platform Support:
       - Unix: Bash scripts with chmod +x
       - Windows: PowerShell scripts (.ps1) + batch wrappers (.cmd)
       - Auto-detect platform and install appropriate scripts
  validation: |
    - hooks install creates scripts in .git/hooks/
    - hooks uninstall removes scripts
    - hooks run executes configured commands
    - Works on both Unix and Windows
    - Respects project.yaml configuration
  artifacts:
    - HookManager class
    - CLI commands
    - Hook script templates
    - project.yaml configuration
