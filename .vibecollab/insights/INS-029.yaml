body:
  scenario: Core principles for AI-human collaboration
  approach: 'Principles: (1) AI is not an executor but a collaboration partner (2)
    Don''t rush to produce code - first align understanding (3) Every decision is
    a result of shared thinking (4) The conversation itself is part of the design
    process. Implementation: dialogue-driven task units, decision tiers (S/A/B/C),
    long-term dialogue engineering with persistent context'
