body:
  scenario: Implementing internationalization for CLI tools with Python gettext
  approach: 'Structure: locale files in i18n/locales/{lang}/LC_MESSAGES/, .po/.mo
    format. CLI support: --lang flag, auto-detect from env. Runtime: gettext.translation()
    with fallback. Mark strings: _(''...'') wrapper. Extract: xgettext, Update: msgmerge,
    Compile: msgfmt. Support zh_CN, en'
