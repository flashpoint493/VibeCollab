  approach: 'Three-level dedup: (1) Fingerprint exact match (2) Title Jaccard similarity
    (3) Tag overlap. Combined score = 0.5*title + 0.5*tags. Graph: build_graph() creates
    nodes/edges from derived_from. to_mermaid() generates flowchart. Export/Import:
    cross-project portability with skip/rename/overwrite strategies'
