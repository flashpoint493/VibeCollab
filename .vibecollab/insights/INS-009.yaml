body:
  scenario: Transitioning from working project to professional open-source
  approach: '5-phase sequential execution: (1) v0.10.0 - Feature freeze + QA validation
    + 85% coverage (2) v0.10.1 - Code i18n (36 files translated) (3) v0.10.2 - Doc
    bilingual (README EN) (4) v0.10.3 - Git history rewrite + GitHub facade (5) v1.0.0
    - Stable release. Strict order: features first, then polish. Each version independently
    releasable'
