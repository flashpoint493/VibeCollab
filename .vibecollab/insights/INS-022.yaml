body:
  scenario: Setting up automated release pipeline from GitHub to PyPI
  approach: 'Workflow: .github/workflows/publish.yml. Trigger: workflow_dispatch or
    release. Steps: checkout, setup Python, install hatch, build with hatchling, publish
    to PyPI (trusted publishing). Permissions: id-token: write, contents: read. Backfill:
    create GitHub Releases for historical versions. Tags: git tag -a vX.Y.Z'
