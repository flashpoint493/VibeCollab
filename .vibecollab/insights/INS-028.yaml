category: decision
body:
  scenario: Enforcing version control from project inception
  approach: 'Auto-check Git status during project init. Option: auto-initialize or
    prompt. First commit: git add -A && git commit -m ''init''. Constraint is protocol-level,
    not in package scripts. Reinforces Git sync habits in subsequent conversations.
    Provides --no-git option for special cases'
