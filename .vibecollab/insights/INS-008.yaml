body:
  scenario: Automating multi-round workflows for E2E testing and protocol automation
  approach: 'Use YAML execution plan + thin runner + host adapters (file_exchange,
    subprocess, auto). Plan is human-written YAML, not LLM-generated. Steps: cli,
    assert, wait, prompt, loop. Variable passing via store_as/{{var}}. Host adapters:
    FileExchange (IDE AI), Subprocess (CLI tools), Auto (keyboard simulation). Zero
    new dependencies, uses only subprocess.run + PyYAML'
