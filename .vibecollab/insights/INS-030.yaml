body:
  scenario: Classifying decisions by scope and review requirements
  approach: 'Tiers: S (Strategic) - overall direction, human confirm required. A (Architecture)
    - system design, human review. B (Implementation) - approach selection, AI suggests,
    human quick-confirm. C (Detail) - naming/formatting, AI decides autonomously.
    Format: DECISION-{number} with level, role, problem, options, decision, rationale,
    date, status fields'
