kind: insight
version: '1'
id: INS-043
title: 'Commit-Type-Based Dynamic Document Sync Check'
summary: Dynamically enforce document sync requirements based on commit message prefix (FEAT, FIX, DOC, CONFIG, etc.) to ensure relevant docs are updated together with code changes
tags:
- git-hooks
- commit-type
- dynamic-check
- workflow
- document-sync
category: workflow
body:
  scenario: Different types of changes require different documentation updates. Feature development needs CONTEXT + QA updates, while config changes may only need minimal docs. One-size-fits-all checks are either too strict or too lenient.
  approach: |
    1. **Commit Prefix Rules** (project.yaml):
       Map commit prefixes to required document updates:
       ```yaml
       git_workflow:
         commit_prefixes:
           - prefix: '[FEAT]'
             description: New features
             roles: [DEV]
             doc_requirements:
               - docs/CONTEXT.md
               - docs/QA_TEST_CASES.md
               - docs/CHANGELOG.md
             severity: error
             reason: Features must have context and test coverage
           
           - prefix: '[FIX]'
             description: Bug fixes
             roles: [DEV, QA]
             doc_requirements:
               - docs/CHANGELOG.md
               - docs/QA_TEST_CASES.md  # regression test
             severity: error
             reason: Bug fixes need changelog and regression tests
           
           - prefix: '[DOC]'
             description: Documentation updates
             roles: [PM, DESIGN]
             doc_requirements:
               - docs/ROADMAP.md
               - docs/DECISIONS.md
             severity: warning
             reason: Doc changes should update planning docs
           
           - prefix: '[CONFIG]'
             description: Config adjustments
             roles: [DEV]
             doc_requirements: []  # No docs required
             severity: info
             reason: Config changes don't need doc updates
           
           - prefix: '[REFACTOR]'
             description: Refactoring
             roles: [ARCH, DEV]
             doc_requirements:
               - docs/CONTEXT.md
             severity: warning
             reason: Major refactoring should document architectural changes
       ```
    
    2. **Pre-commit Hook Logic**:
       ```bash
       # 1. Extract commit message
       COMMIT_MSG=$(cat $1)
       
       # 2. Detect prefix
       if [[ $COMMIT_MSG =~ ^\[([A-Z]+)\] ]]; then
           PREFIX="${BASH_REMATCH[1]}"
           
       # 3. Get required docs for this prefix
       REQUIRED_DOCS=$(vibecollab config get git_workflow.commit_prefixes.$PREFIX.doc_requirements)
       SEVERITY=$(vibecollab config get git_workflow.commit_prefixes.$PREFIX.severity)
       
       # 4. Check if required docs are staged
       for doc in $REQUIRED_DOCS; do
           if ! git diff --cached --name-only | grep -q "$doc"; then
               echo "❌ $PREFIX commits require $doc to be updated"
               echo "   Reason: $(vibecollab config get git_workflow.commit_prefixes.$PREFIX.reason)"
               
               if [ "$SEVERITY" = "error" ]; then
                   exit 1  # Block commit
               elif [ "$SEVERITY" = "warning" ]; then
                   echo "   ⚠️  Warning: Commit allowed but docs are out of sync"
               fi
           fi
       done
       fi
       ```
    
    3. **Check Command Integration**:
       - `vibecollab check --strict` enforces commit-type rules
       - Shows which docs should be updated based on staged files
       - Suggests commit message prefix based on changed files
    
    4. **Benefits**:
       - Context-aware: Different rules for different change types
       - Workflow-aligned: Matches how teams actually work
       - Flexible: Can disable requirements per prefix
       - Clear feedback: Explains WHY docs are needed
    
    5. **Future Enhancement**:
       - Auto-suggest commit prefix based on file changes
       - Smart detection: code/*.py → [FEAT], docs/*.md → [DOC]
       - Integration with PR templates
  validation: |
    - [FEAT] commits blocked if QA_TEST_CASES.md not staged
    - [FIX] commits blocked if CHANGELOG.md not updated
    - [CONFIG] commits pass without doc requirements
    - Clear error messages explain which docs and why
  artifacts:
    - project.yaml commit_prefixes configuration
    - Enhanced pre-commit hook
    - vibecollab check --strict mode
