body:
  scenario: Keeping ROADMAP.md milestones and Task status synchronized
  approach: 'RoadmapParser parses milestones and extracts inline TASK-ID references.
    Bidirectional sync: ROADMAP [x] ↔ Task DONE status. Modes: roadmap_to_tasks, tasks_to_roadmap,
    both. Task dataclass has milestone field. CLI: roadmap status/sync/parse + task
    create --milestone'
