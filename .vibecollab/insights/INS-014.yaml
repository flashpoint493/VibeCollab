kind: insight
version: '1'
id: INS-014
title: 功能重复时优先判断是否已有外部替代方案
summary: 自建Agent不如集成MCP+Cursor/Cline,避免与外部IDE能力重复
tags:
- 架构决策
- MCP
- Agent
- 外部工具
- 避免重复造轮子
category: decision
body:
  scenario: 计划自建某功能时,发现外部工具链(IDE插件/MCP协议等)已能覆盖该场景
  approach: 1. 列出自建方案的独特价值点; 2. 逐一检查外部方案是否已覆盖; 3. 如果覆盖率>=90%则砍掉自建,将精力投入集成; 4. 冻结而非删除已有代码(标记experimental),保留未来重启可能
  validation: 确认砍掉的功能确实被外部方案覆盖,无用户场景遗漏
