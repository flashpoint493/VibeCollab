body:
  scenario: 'Supporting different AI interaction scenarios: IDE dialogue, CLI human-machine,
    Agent autonomous'
  approach: 'Implement three-mode coexistence: (1) IDE dialogue - direct collaboration
    in Cursor/CodeBuddy (2) CLI human-machine - vibecollab ai ask/chat without IDE
    (3) Agent autonomous - server deployment with API Key. Agent has safety gates:
    PID lock, pending-solidify, max cycles, adaptive backoff, circuit breaker'
