body:
  scenario: Keeping version numbers consistent across 7+ files during release
  approach: 'Files to sync: __init__.py, pyproject.toml, README.md, README.pypi.md,
    docs/CONTEXT.md, docs/CHANGELOG.md, skill.md. Tool: scripts/bump_version.py. Commands:
    check (dry-run), --sync (apply), <version> (bump). Windows GBK compatible output.
    Single source of truth via CLI'
