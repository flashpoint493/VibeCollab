kind: insight
version: '1'
id: INS-053
title: Multi-File Documentation Synchronization Pattern for Major Releases
summary: Systematic checklist approach for synchronizing 4+ documentation files during
  major version releases
tags:
- documentation
- release
- synchronization
- readme
- skill
- consistency
category: workflow
body:
  scenario: 'When releasing a major version (e.g. v0.11.0) with significant new features,
    multiple documentation files must be updated consistently: skill.md (AI setup
    guide), README.md (main docs), README.pypi.md (PyPI-specific), README.zh-CN.md
    (Chinese docs), ROADMAP.md, CHANGELOG.md.'
  approach: '1. Identify all touch points: MCP tool count, CLI Reference (command
    renames/additions), Features section, Architecture table, Version history, footer
    version numbers. 2. Create a checklist of common fields across all files. 3. Update
    in order: skill.md (AI-facing) → README.md (primary) → README.pypi.md (PyPI mirror)
    → README.zh-CN.md (i18n mirror). 4. Cross-reference all changed CLI commands (e.g.
    dev→role migration). 5. Mark ROADMAP task as complete, add CHANGELOG entry. 6.
    Key pattern: dev→role migration must be consistent across all 4 README variants.'
