  created_by: ocarina
  created_at: '2026-02-27'
  context: v0.9.2自举(bootstrap价值不足,已有手写CONTRIBUTING_AI.md)和v0.10.1 Agent增强(MCP+外部IDE已覆盖)被砍掉,版本链从5个简化为3个
