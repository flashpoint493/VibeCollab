body:
  scenario: Managing task state transitions with validation gates
  approach: 'Task statuses: TODO → IN_PROGRESS → REVIEW → DONE. Transition validation:
    check prerequisites, conflicts, scope limits. Solidify: confirm task completion,
    update artifacts, record Insights. Rollback: safe state reversal with cleanup.
    Onboard injection: auto-load active tasks into conversation context'
