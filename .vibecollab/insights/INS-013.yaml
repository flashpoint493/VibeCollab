kind: insight
version: '1'
id: INS-013
title: 版本规划应果断砍掉低价值里程碑
summary: 低价值的条件性里程碑应直接砍掉，不要让它们占据版本号拖慢节奏
tags:
- 版本规划
- 决策
- 聚焦
- YAGNI
category: decision
body:
  scenario: 路线图中存在多个条件性/低优先级里程碑占据版本号时
  approach: 1. 评估每个里程碑的独立价值（是否有替代方案已覆盖）; 2. 对已有替代方案覆盖的功能直接砍掉而非降级; 3. 版本号留给有实际交付物的里程碑（文档/发布/功能）;
    4. 被砍内容降入未来规划而非删除，保留历史记录
  validation: ROADMAP 版本链清晰连贯，每个版本有明确交付物
artifacts: []
