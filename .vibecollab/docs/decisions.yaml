decisions:
  - id: DECISION-028
    title: "Monorepo Split Package Strategy"
    date: "2026-04-25"
    level: S
    status: confirmed
    context: "v0.12.6 main package contains all code in src/vibecollab/. Need to split into independently installable sub-packages for modular adoption."
    problem: "How to split monorepo into 8 PyPI packages while maintaining backward compatibility and functional stability?"
    decision_text: |
      1. Namespace: Keep independent top-level packages (vibecollab_core, vibecollab_cli, etc.) rather than namespace packages (vibecollab.core). Already published on PyPI 0.12.5.
      2. File allocation: Core owns all foundational modules (core/, domain/, utils/, i18n/, contrib/, search/); other packages own their specialty modules. Task-related domain files duplicated in vibecollab-tasks for backward compat.
      3. Import strategy: Rewrite all cross-package relative imports to absolute imports pointing to the owning package. Keep intra-package relative imports unchanged.
      4. Dependency graph: core (base) → insights/ide/mcp → cli (aggregator). Patterns and generator re-export core APIs for backward compat.
      5. Validation order: Fix sub-packages first → local validation → PyPI publish → main repo branch switch → combination validation → main package release.
    rationale: "Independent top-level packages avoid namespace package fragility. Absolute cross-package imports make dependencies explicit. Staged validation prevents breaking the stable release."

  - id: DECISION-027
    title: "v0.12.0 YAML Schema Design Strategy"
    date: "2026-04-01"
    level: S
    status: confirmed
    context: "v0.12.0 requires YAML schemas for all doc types. User confirmed three key design principles."
    problem: "Need schema design for 6 document types to enable Markdown → YAML migration"
    decision_text: |
      1. Big-Bang migration (confirmed from DECISION-025). Only CONTRIBUTING_AI.md, skill.md, README.md remain as Markdown.
      2. YAML docs can be aggregated back to Markdown via `vibecollab docs render`. Descriptive content stays descriptive in YAML.
      3. Follow insight.schema.yaml pattern (kind + version top-level). Design must be robust and forward-compatible.
    rationale: "YAML is more effective for AI consumption. Descriptive content in YAML still serves both AI parsing and human rendering via Markdown view generation."
    related_tasks: ["TASK-DEV-030"]

