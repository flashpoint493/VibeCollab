##
# Self-Bootstrap Demo Plan
#
# This plan demonstrates VibeCollab driving itself through a complete
# protocol workflow: init a temp project, run protocol checks, create
# and advance tasks, validate document generation, and verify health.
#
# Usage:
#   vibecollab plan run examples/demo_bootstrap.yaml -v
#   vibecollab plan run examples/demo_bootstrap.yaml -v --json
##

name: "Self-Bootstrap Demo: VibeCollab Drives VibeCollab"
description: >
  A self-referential demonstration where the Execution Plan feature
  automates a full VibeCollab protocol workflow in a temporary project.
on_fail: abort

steps:
  # ── Phase 1: Environment Validation ──────────────────────────

  - action: cli
    description: "Verify vibecollab CLI is installed"
    command: "vibecollab --version"
    expect:
      exit_code: 0
      stdout_contains: "vibecollab"

  - action: cli
    description: "Verify Python environment"
    command: "python --version"
    expect:
      exit_code: 0

  # ── Phase 2: Initialize a fresh project ──────────────────────

  - action: cli
    description: "Clean any leftover temp dir"
    command: "python -c \"import shutil; shutil.rmtree('_demo_project', ignore_errors=True)\""

  - action: cli
    description: "Create temp demo directory"
    command: "python -c \"import os; os.makedirs('_demo_project', exist_ok=True)\""

  - action: cli
    description: "Init VibeCollab project in temp dir"
    command: "vibecollab init -n demo-bootstrap -d generic -o _demo_project --force"
    expect:
      exit_code: 0
    store_as: init_output

  - action: assert
    description: "Verify init output mentions success"
    stdout_contains: "demo-bootstrap"

  - action: assert
    description: "Verify project.yaml was created"
    file: "_demo_project/project.yaml"
    contains: "demo-bootstrap"

  - action: assert
    description: "Verify CONTRIBUTING_AI.md was generated"
    file: "_demo_project/CONTRIBUTING_AI.md"

  # ── Phase 3: Git setup ──────────────────────────────────────

  - action: cli
    description: "Init git repo in demo project"
    command: "cd _demo_project && git init && git add -A && git commit -m \"init: bootstrap demo\""
    expect:
      exit_code: 0

  # ── Phase 4: Protocol check ─────────────────────────────────

  - action: cli
    description: "Run protocol check on demo project"
    command: "cd _demo_project && vibecollab check"
    store_as: check_output
    on_fail: continue

  - action: cli
    description: "Run health check"
    command: "cd _demo_project && vibecollab health"
    store_as: health_output
    on_fail: continue

  # ── Phase 5: Plan validation (self-referential!) ────────────

  - action: cli
    description: "Validate this very plan file (self-reference!)"
    command: "vibecollab plan validate examples/demo_bootstrap.yaml"
    expect:
      exit_code: 0
      stdout_contains: "valid"

  # ── Phase 6: Dry-run a nested plan ──────────────────────────

  - action: cli
    description: "Create an inline mini-plan for dry-run test"
    command: "python -c \"import yaml; yaml.dump({'name':'nested','steps':[{'action':'cli','command':'echo nested-ok'}]}, open('_demo_project/mini_plan.yaml','w'))\""
    expect:
      exit_code: 0

  - action: cli
    description: "Dry-run the nested mini plan"
    command: "cd _demo_project && vibecollab plan run mini_plan.yaml --dry-run"
    expect:
      exit_code: 0

  # ── Phase 7: Generate llms.txt ──────────────────────────────

  - action: cli
    description: "Generate llms.txt from demo project"
    command: "cd _demo_project && vibecollab generate -c project.yaml"
    store_as: generate_output
    on_fail: continue

  # ── Phase 8: Cleanup ────────────────────────────────────────

  - action: cli
    description: "Remove temp demo project"
    command: "python -c \"import shutil, time; time.sleep(0.2); shutil.rmtree('_demo_project', ignore_errors=True)\""

  - action: wait
    description: "Brief wait for OS to release file handles"
    seconds: 0.5

  - action: cli
    description: "Verify cleanup complete (dir should not exist)"
    command: "python -c \"import os, shutil; shutil.rmtree('_demo_project', ignore_errors=True); ok=not os.path.exists('_demo_project'); print('cleanup OK' if ok else 'cleanup partial')\""
    expect:
      exit_code: 0
