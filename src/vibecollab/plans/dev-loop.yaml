# VibeCollab Development Loop
# A complete autonomous development workflow
#
# Usage:
#   vibecollab auto init plans/dev-loop.yaml
#   Double-click the generated .bat file to start
#
# This plan implements the full VibeCollab development cycle:
#   1. Onboard & Check - Understand context, verify consistency
#   2. Plan & Execute - Read PRD/ROADMAP, complete development tasks
#   3. Capture & Update - Record insights, update documentation
#   4. Loop - Continue until all tasks complete

name: "VibeCollab Development Loop"
host: file_exchange

steps:
  - action: loop
    max_rounds: 50
    goal: "All vibecollab checks pass and no pending tasks"
    state_command: "vibecollab next --json"
    prompt_template: |
      # Development Loop - Round {{round}}/{{max_rounds}}
      
      ## Step 1: Context & Status
      
      Current project state:
      ```json
      {{state}}
      ```
      
      ## Step 2: Your Tasks
      
      Based on the above state, please:
      
      ### 2.1 If there are consistency issues (stale docs, missing files):
      - Fix them first before proceeding
      - Run `vibecollab check` to verify
      
      ### 2.2 If consistency is OK, proceed with development:
      - Read `docs/CONTEXT.md` for current focus
      - Read `docs/ROADMAP.md` for pending tasks
      - Read `docs/PRD.md` if requirements are unclear
      - Pick the highest priority task and implement it
      
      ### 2.3 After completing work:
      - If you learned something reusable, record it:
        `vibecollab insight add --title "..." --tags "..." --category pattern`
      - Update `docs/CONTEXT.md` with your progress
      - Update `docs/CHANGELOG.md` if significant changes
      - Commit your changes: `git add -A && git commit -m "feat: ..."`
      
      ### 2.4 Final check:
      - Run `vibecollab check` to verify all is well
      
      ## Step 3: Report
      
      When done with this round, write a summary to `.vibecollab/loop/response.md`:
      - What you accomplished
      - Any blockers or issues
      - What should happen next
      
      End with: `<!-- VIBECOLLAB_RESPONSE_READY -->`
      
      ---
      Goal: {{goal}}
    check_command: "vibecollab check --json"
    check_expect:
      exit_code: 0
    on_round_fail: continue
