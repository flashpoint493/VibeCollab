# Self-bootstrap test for vibecollab auto driver
# Run: vibecollab auto start plans/self-test-auto.yaml --ide cursor -v

name: "VibeCollab Self-Test Auto Driver"
host: file_exchange

steps:
  - action: loop
    max_rounds: 3
    goal: "vibecollab check passes"
    state_command: "vibecollab next --json"
    prompt_template: |
      ## VibeCollab Self-Test - Round {{round}}/{{max_rounds}}
      
      Current project state:
      {{state}}
      
      Goal: {{goal}}
      
      Please:
      1. Run `vibecollab check` to check project status
      2. If there are errors, fix them
      3. If no errors, update docs/CONTEXT.md to record this test
      
      When done, write results to `.vibecollab/loop/response.md`
      and add `<!-- VIBECOLLAB_RESPONSE_READY -->` at the end.
    check_command: "vibecollab check"
    check_expect:
      exit_code: 0
