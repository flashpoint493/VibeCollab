# Quick Fix Loop
# For rapid iteration on bugs and small improvements
#
# Usage:
#   vibecollab auto init plans/quick-fix.yaml
#
# Focuses on:
#   - Running checks and fixing issues
#   - Quick commits
#   - Minimal documentation overhead

name: "Quick Fix Loop"
host: file_exchange

steps:
  - action: loop
    max_rounds: 10
    goal: "All checks pass with no warnings"
    state_command: "vibecollab check --json"
    prompt_template: |
      # Quick Fix - Round {{round}}/{{max_rounds}}
      
      ## Current Check Results
      ```json
      {{state}}
      ```
      
      ## Your Task
      
      1. **If there are errors**: Fix them immediately
      2. **If there are warnings**: Address the most critical ones
      3. **Commit fixes**: `git add -A && git commit -m "fix: ..."`
      4. **Re-run check**: `vibecollab check`
      
      ## Report
      
      Write to `.vibecollab/loop/response.md`:
      - What you fixed
      - Any remaining issues
      
      End with: `<!-- VIBECOLLAB_RESPONSE_READY -->`
    check_command: "vibecollab check"
    check_expect:
      exit_code: 0
