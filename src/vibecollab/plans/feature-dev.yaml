# Feature Development Loop
# Focused development workflow for implementing new features
#
# Usage:
#   vibecollab auto init plans/feature-dev.yaml
#
# Best for:
#   - New feature implementation
#   - Following ROADMAP tasks
#   - Test-driven development

name: "Feature Development Loop"
host: file_exchange

steps:
  - action: loop
    max_rounds: 30
    goal: "Current milestone tasks completed"
    state_command: "vibecollab roadmap status --json"
    prompt_template: |
      # Feature Development - Round {{round}}/{{max_rounds}}
      
      ## Milestone Status
      ```json
      {{state}}
      ```
      
      ## Development Workflow
      
      ### 1. Pick a Task
      - Review the milestone status above
      - Select the next uncompleted task
      - If unclear, read `docs/PRD.md` for requirements
      
      ### 2. Implement
      - Write code following project conventions
      - Add/update tests as needed
      - Run tests: `pytest` or project test command
      
      ### 3. Document
      - Update `docs/CONTEXT.md` with progress
      - If you learned something valuable:
        `vibecollab insight add --title "..." --tags "..." --category pattern`
      
      ### 4. Commit & Sync
      - `git add -A && git commit -m "feat: <description>"`
      - `vibecollab roadmap sync` to update task status
      - `vibecollab check` to verify
      
      ## Report
      
      Write to `.vibecollab/loop/response.md`:
      - Task completed (or progress made)
      - Tests passing?
      - Next task to tackle
      
      End with: `<!-- VIBECOLLAB_RESPONSE_READY -->`
    check_command: "vibecollab roadmap status --json"
    check_expect:
      exit_code: 0
