# Insight Harvest Loop
# Extract and organize development knowledge
#
# Usage:
#   vibecollab auto init plans/insight-harvest.yaml
#
# Best for:
#   - End of sprint retrospectives
#   - Knowledge consolidation
#   - Experience documentation

name: "Insight Harvest Loop"
host: file_exchange

steps:
  - action: loop
    max_rounds: 10
    goal: "All valuable experiences captured as insights"
    state_command: "vibecollab insight suggest --json"
    prompt_template: |
      # Insight Harvest - Round {{round}}/{{max_rounds}}
      
      ## Suggested Insights
      ```json
      {{state}}
      ```
      
      ## Your Tasks
      
      ### 1. Review Suggestions
      - Look at the suggested insights above
      - These are auto-detected from recent changes
      
      ### 2. Create Quality Insights
      For each valuable experience:
      ```bash
      vibecollab insight add \
        --title "Clear, actionable title" \
        --tags "tag1,tag2,tag3" \
        --category pattern \  # or: pitfall, decision, reference
        --scenario "When/where this applies" \
        --approach "What to do"
      ```
      
      ### 3. Review Existing Insights
      - `vibecollab insight list` to see all
      - `vibecollab insight decay --dry-run` to see stale ones
      - Consider updating or archiving outdated insights
      
      ### 4. Check Insight Health
      - `vibecollab insight check` for consistency
      - Fix any issues found
      
      ## Report
      
      Write to `.vibecollab/loop/response.md`:
      - Insights created this round
      - Any insights updated/archived
      - Knowledge gaps identified
      
      End with: `<!-- VIBECOLLAB_RESPONSE_READY -->`
    check_command: "vibecollab insight check --json"
    check_expect:
      exit_code: 0
