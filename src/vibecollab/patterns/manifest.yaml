# Pattern Manifest — Defines section order, template files and conditional switches for CONTRIBUTING_AI.md
# Each section corresponds to a .md.j2 template file

sections:
  - id: header
    template: 01_header.md.j2
    description: "Document title and version"

  - id: philosophy
    template: 02_philosophy.md.j2
    description: "Core philosophy (Vibe Development / Decision quality / Long-term dialogue)"

  - id: roles
    template: 03_roles.md.j2
    description: "Role definitions"

  - id: decision_levels
    template: 04_decision_levels.md.j2
    description: "Decision classification system"

  - id: task_unit
    template: 05_task_unit.md.j2
    description: "Task unit definition"

  - id: dialogue_protocol
    template: 06_dialogue_protocol.md.j2
    description: "Standard dialogue flow"

  - id: requirement_clarification
    template: 07_requirement_clarification.md.j2
    description: "Requirement clarification protocol"
    condition: "config.requirement_clarification.enabled|true"

  - id: iteration_protocols
    template: 08_iteration_protocols.md.j2
    description: "Iteration management protocols (version review/build/config-level iteration)"

  - id: qa_protocol
    template: 09_qa_protocol.md.j2
    description: "QA acceptance protocol + quick acceptance template"
    condition: "config.testing.product_qa.enabled|true"

  - id: git_workflow
    template: 10_git_workflow.md.j2
    description: "Git collaboration standards"

  - id: testing
    template: 11_testing.md.j2
    description: "Testing system (Unit Test / Product QA)"

  - id: milestone
    template: 12_milestone.md.j2
    description: "Milestone definition"

  - id: iteration
    template: 13_iteration.md.j2
    description: "Iteration management (suggestion pool/config-level iteration)"

  - id: lifecycle_rules
    template: 14_lifecycle_rules.md.j2
    description: "Phase-based collaboration rules"

  - id: documentation
    template: 15_documentation.md.j2
    description: "Context management (key files/restore/save protocol)"

  - id: multi_developer
    template: 16_multi_developer.md.j2
    description: "Multi-developer/Agent collaboration protocol"
    condition: "config.multi_developer.enabled"

  - id: prompt_engineering
    template: 17_prompt_engineering.md.j2
    description: "Prompt engineering best practices"
    condition: "config.prompt_engineering.enabled|true"

  - id: symbology
    template: 18_symbology.md.j2
    description: "Symbology annotation system"
    condition: "config.symbology"

  - id: decisions_summary
    template: 19_decisions_summary.md.j2
    description: "Confirmed decisions summary"

  - id: extension_sections
    template: 20_extension_sections.md.j2
    description: "Domain extension appendix"
    condition: "has_extensions"

  - id: protocol_check
    template: 21_protocol_check.md.j2
    description: "Protocol self-check mechanism"
    condition: "config.protocol_check.enabled|true"

  - id: prd_management
    template: 22_prd_management.md.j2
    description: "Product requirements document management"
    condition: "config.prd_management.enabled|true"

  - id: quick_reference
    template: 23_quick_reference.md.j2
    description: "Quick reference"

  - id: changelog
    template: 24_changelog.md.j2
    description: "CONTRIBUTING_AI.md iteration log"

  - id: git_history
    template: 25_git_history.md.j2
    description: "Git commit history reference"

  - id: insight_workflow
    template: 27_insight_workflow.md.j2
    description: "Insight accumulation workflow (when/how to create)"
    condition: "config.insight.enabled|true"

  - id: footer
    template: 26_footer.md.j2
    description: "Document footer"
