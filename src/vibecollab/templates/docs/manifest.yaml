# YAML Templates Manifest — Index for YAML-native document templates
# These templates generate structured YAML documents instead of Markdown
# YAML is the source of truth; Markdown is a generated view

version: "1.0"
description: "YAML-native document templates for VibeCollab Pattern Engine"

# Core document templates — always generated
core_templates:
  - id: context
    template: context.yaml.j2
    output: docs/context.yaml
    description: "Project context and current state"
    required: true

  - id: decisions
    template: decisions.yaml.j2
    output: docs/decisions.yaml
    description: "Confirmed and pending decisions"
    required: true

  - id: changelog
    template: changelog.yaml.j2
    output: docs/changelog.yaml
    description: "Project changelog"
    required: true

  - id: roadmap
    template: roadmap.yaml.j2
    output: docs/roadmap.yaml
    description: "Milestones and roadmap planning"
    required: true

# Configuration templates — define collaboration patterns
config_templates:
  - id: philosophy
    template: philosophy.yaml.j2
    output: docs/philosophy.yaml
    description: "Core philosophy and decision quality principles"
    condition: "config.philosophy.enabled|true"

  - id: roles
    template: roles.yaml.j2
    output: docs/roles.yaml
    description: "Role definitions for multi-role collaboration"
    condition: "roles|length > 0"

  - id: workflow
    template: workflow.yaml.j2
    output: docs/workflow.yaml
    description: "Task unit, dialogue protocol, and iteration protocols"
    condition: "config.workflow.enabled|true"

  - id: decision_levels
    template: decision_levels.yaml.j2
    output: docs/decision_levels.yaml
    description: "Decision classification system (S/A/B/C levels)"
    condition: "decision_levels|length > 0"

  - id: git_workflow
    template: git_workflow.yaml.j2
    output: docs/git_workflow.yaml
    description: "Git collaboration standards and branch strategy"
    condition: "config.git_workflow.enabled|true"

  - id: testing
    template: testing.yaml.j2
    output: docs/testing.yaml
    description: "Testing system configuration (Unit Test / Product QA)"
    condition: "config.testing.enabled|true"

  - id: qa
    template: qa.yaml.j2
    output: docs/qa.yaml
    description: "QA test cases template"
    condition: "config.testing.product_qa.enabled|true"

  - id: milestone
    template: milestone.yaml.j2
    output: docs/milestone.yaml
    description: "Milestone definition and lifecycle"
    condition: "config.milestone.enabled|true"

  - id: iteration
    template: iteration.yaml.j2
    output: docs/iteration.yaml
    description: "Iteration management protocols"
    condition: "config.iteration.enabled|true"

  - id: lifecycle
    template: lifecycle.yaml.j2
    output: docs/lifecycle.yaml
    description: "Phase-based collaboration rules (demo/production/commercial/stable)"
    condition: "config.lifecycle.enabled|true"

  - id: documentation
    template: documentation.yaml.j2
    output: docs/documentation.yaml
    description: "Context management and documentation protocols"
    condition: "config.documentation.enabled|true"

  - id: collaboration
    template: collaboration.yaml.j2
    output: docs/collaboration.yaml
    description: "Multi-developer/Agent collaboration protocol"
    condition: "config.role_context.enabled"

  - id: guidelines
    template: guidelines.yaml.j2
    output: docs/guidelines.yaml
    description: "Prompt engineering best practices"
    condition: "config.guidelines.enabled|true"

  - id: symbology
    template: symbology.yaml.j2
    output: docs/symbology.yaml
    description: "Symbology annotation system"
    condition: "config.symbology|length > 0"

  - id: protocol_check
    template: protocol_check.yaml.j2
    output: docs/protocol_check.yaml
    description: "Protocol self-check mechanism configuration"
    condition: "config.protocol_check.enabled|true"

  - id: prd
    template: prd.yaml.j2
    output: docs/prd.yaml
    description: "Product requirements document template"
    condition: "config.prd_management.enabled|true"

  - id: prd_management
    template: prd_management.yaml.j2
    output: docs/prd_management.yaml
    description: "PRD management protocols and workflow"
    condition: "config.prd_management.enabled|true"

  - id: insights
    template: insights.yaml.j2
    output: docs/insights.yaml
    description: "Insight accumulation workflow configuration"
    condition: "config.insight.enabled|true"

  - id: quick_reference
    template: quick_reference.yaml.j2
    output: docs/quick_reference.yaml
    description: "Quick reference cards and common commands"
    condition: "config.quick_reference.enabled|true"

  - id: extensions
    template: extensions.yaml.j2
    output: docs/extensions.yaml
    description: "Domain extension configuration"
    condition: "has_extensions"

# Template mapping from old .md.j2 to new .yaml.j2
# This helps track the migration from Markdown to YAML-native templates
migration_mapping:
  "01_header.md.j2": "context.yaml.j2"
  "02_philosophy.md.j2": "philosophy.yaml.j2"
  "03_roles.md.j2": "roles.yaml.j2"
  "04_decision_levels.md.j2": "decision_levels.yaml.j2"
  "05_task_unit.md.j2": "workflow.yaml.j2"
  "06_dialogue_protocol.md.j2": "workflow.yaml.j2"
  "07_requirement_clarification.md.j2": "workflow.yaml.j2"
  "08_iteration_protocols.md.j2": "iteration.yaml.j2"
  "09_qa_protocol.md.j2": "testing.yaml.j2"
  "10_git_workflow.md.j2": "git_workflow.yaml.j2"
  "11_testing.md.j2": "testing.yaml.j2"
  "12_milestone.md.j2": "milestone.yaml.j2"
  "13_iteration.md.j2": "iteration.yaml.j2"
  "14_lifecycle_rules.md.j2": "lifecycle.yaml.j2"
  "15_documentation.md.j2": "documentation.yaml.j2"
  "16_multi_developer.md.j2": "collaboration.yaml.j2"
  "17_prompt_engineering.md.j2": "guidelines.yaml.j2"
  "18_symbology.md.j2": "symbology.yaml.j2"
  "19_decisions_summary.md.j2": "decisions.yaml.j2"
  "20_extension_sections.md.j2": "extensions.yaml.j2"
  "21_protocol_check.md.j2": "protocol_check.yaml.j2"
  "22_prd_management.md.j2": "prd_management.yaml.j2"
  "23_quick_reference.md.j2": "quick_reference.yaml.j2"
  "24_changelog.md.j2": "changelog.yaml.j2"
  "25_git_history.md.j2": null  # Merged into git_workflow
  "26_footer.md.j2": null  # Not needed for YAML
  "27_insight_workflow.md.j2": "insights.yaml.j2"

# Template categories for organization
categories:
  core:
    - context
    - decisions
    - changelog
    - roadmap
  configuration:
    - philosophy
    - roles
    - workflow
    - decision_levels
    - git_workflow
    - testing
    - qa
    - milestone
    - iteration
    - lifecycle
    - documentation
  collaboration:
    - collaboration
    - guidelines
    - symbology
    - protocol_check
    - insights
    - quick_reference
  domain:
    - extensions
    - prd
    - prd_management
