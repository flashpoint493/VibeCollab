# Data Engineering Domain Extension
# Extension = workflow hooks + context injection + reference documents

# Role overrides
roles_override:
  - code: "DESIGN"
    name: "Data Product"
    focus: ["data requirements", "metric definitions", "report design"]
    triggers: ["requirements", "metrics", "reports"]

  - code: "DE"
    name: "Data Engineering"
    focus: ["ETL", "data pipelines", "data warehouse"]
    triggers: ["ETL", "pipeline", "warehouse", "scheduling"]

  - code: "DA"
    name: "Data Analysis"
    focus: ["data exploration", "visualization", "insights"]
    triggers: ["analysis", "visualization", "report"]

  - code: "ML"
    name: "Machine Learning"
    focus: ["models", "feature engineering", "training"]
    triggers: ["model", "ML", "features"]

# Domain extensions
domain_extensions:
  data:
    
    # ========== Hook Definitions ==========
    hooks:
      # Inject data quality checks when QA lists test cases
      - trigger: "qa.list_test_cases"
        action: "inject_context"
        context_id: "data_quality_checks"
        condition: "files.exists('tests/expectations/')"
      
      # Check data documentation when feature is complete
      - trigger: "dev.feature_complete"
        action: "append_checklist"
        context_id: "data_doc_check"
        condition: "feature.type in ['etl', 'pipeline', 'model']"
      
      # Pre-pipeline deployment checks
      - trigger: "build.pre"
        action: "inject_context"
        context_id: "pipeline_checklist"
        condition: "project.has_feature('pipeline')"

    # ========== Context Definitions ==========
    contexts:
      # Data quality checks
      data_quality_checks:
        type: "reference"
        source: "docs/DATA_QUALITY.md"
        description: "Data quality rules and validation"
      
      # Data documentation check
      data_doc_check:
        type: "template"
        content: |
          ## Data Documentation Check
          - [ ] Is the schema documented?
          - [ ] Is the data dictionary updated?
          - [ ] Is the data lineage recorded?
          - [ ] Are data quality rules defined?
      
      # Pipeline deployment checklist
      pipeline_checklist:
        type: "template"
        content: |
          ## Pipeline Deployment Checklist
          - [ ] Unit tests pass
          - [ ] Integration tests pass
          - [ ] Data quality validation pass
          - [ ] Scheduling configuration correct
          - [ ] Monitoring and alerting configured
          - [ ] Rollback plan prepared

    # ========== Additional Files ==========
    additional_files:
      - path: "docs/DATA_QUALITY.md"
        purpose: "Data quality rules"
        template: |
          # Data Quality Rules
          
          ## General Rules
          
          | Rule | Description | Threshold |
          |------|-------------|-----------|
          | Completeness | Non-null rate | > 99% |
          | Uniqueness | Primary key uniqueness | 100% |
          | Timeliness | Data latency | < 1h |
          
          ## Table-Level Rules
          
          (Add per table)
      
      - path: "docs/DATA_DICTIONARY.md"
        purpose: "Data dictionary"
        template: |
          # Data Dictionary
          
          ## Table List
          
          | Table | Description | Owner |
          |-------|-------------|-------|
          
          ## Field Descriptions
          
          (Add per table)

    # ========== Configuration ==========
    config:
      test_command: "pytest tests/"
      dq_tool: "great_expectations"
      orchestrator: "airflow"
