# Game Domain Extension
# Extension = workflow hooks + context injection + reference documents

# Role overrides
roles_override:
  - code: "DESIGN"
    name: "Game Designer"
    focus: ["gameplay", "experience", "balance", "narrative"]
    triggers: ["design", "gameplay", "mechanics"]

  - code: "ART"
    name: "Art Director"
    focus: ["style", "asset standards", "visual feedback"]
    triggers: ["art", "visual", "style"]

# Domain extensions
domain_extensions:
  game:
    
    # ========== Hook Definitions ==========
    hooks:
      # Inject GM commands when QA lists test cases
      - trigger: "qa.list_test_cases"
        action: "inject_context"
        context_id: "gm_commands"
        condition: "files.exists('docs/GM_COMMANDS.md')"
      
      # Provide GM test template when feature is complete
      - trigger: "dev.feature_complete"
        action: "inject_context"
        context_id: "gm_test_guide"
        condition: "project.has_feature('gm_console')"
      
      # Pre-build checks
      - trigger: "build.pre"
        action: "append_checklist"
        context_id: "build_checklist"
      
      # Read GDD at dialogue start
      - trigger: "dialogue.start"
        action: "require_file_read"
        context_id: "gdd_files"
        condition: "topic.relates_to('design')"

    # ========== Context Definitions ==========
    contexts:
      # GM command list - reference external document
      gm_commands:
        type: "reference"
        source: "docs/GM_COMMANDS.md"
        inline_if_short: true
        description: "GM console commands for quick testing"
      
      # GM test guide - template
      gm_test_guide:
        type: "template"
        content: |
          ## GM Quick Test
          
          **Test Target**: {feature_name}
          
          **Available GM Commands**: 
          See `docs/GM_COMMANDS.md` or press `{gm_trigger_key}` to open console
          
          **Recommended Test Steps**:
          1. Use GM to skip non-target workflows
          2. Quickly reach the test scenario
          3. Verify feature behavior
          4. Disable GM to verify normal flow
      
      # Build checklist
      build_checklist:
        type: "template"
        content: |
          ## Pre-Build Checklist
          - [ ] `{build_command}`
          - [ ] Double-click `{dist_entry}` to test
          - [ ] Confirm game runs normally
          - [ ] Update instructions (if new features)
      
      # GDD file list - dynamically computed
      gdd_files:
        type: "file_list"
        pattern: "docs/GDD_*.md"
        description: "Game design documents"

    # ========== Additional Files ==========
    additional_files:
      - path: "docs/GM_COMMANDS.md"
        purpose: "GM console command documentation"
        template: |
          # GM Console Commands
          
          Press `/` to open the console.
          
          ## General Commands
          
          | Command | Args | Description |
          |---------|------|-------------|
          | `god` | - | Toggle invincibility |
          | `tp` | x y z | Teleport to position |
          | `give` | item_id [amount] | Give item |
          | `clear` | - | Clear inventory |
          | `refill` | - | Refill resources |
          
          ## Project-Specific Commands
          
          (Add per project)
      
      - path: "docs/BALANCE.md"
        purpose: "Balance spreadsheet"
        template: |
          # Balance Spreadsheet
          
          ## Character Attributes
          
          | Attribute | Initial Value | Description |
          |-----------|---------------|-------------|
          
          ## Item Values
          
          (To be filled)

    # ========== Configuration ==========
    config:
      gm_trigger_key: "/"
      build_command: "npm run build"
      dev_command: "npm run dev"
      dist_entry: "dist/index.html"
