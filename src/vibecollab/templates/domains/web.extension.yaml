# Web Application Domain Extension
# Extension = workflow hooks + context injection + reference documents

# Role overrides
roles_override:
  - code: "DESIGN"
    name: "Product Design"
    focus: ["requirements", "user experience", "interaction design", "prototyping"]
    triggers: ["product", "design", "requirements", "PRD"]

  - code: "FE"
    name: "Frontend Development"
    focus: ["UI implementation", "interaction logic", "performance optimization"]
    triggers: ["frontend", "page", "component"]

  - code: "BE"
    name: "Backend Development"
    focus: ["API", "database", "service architecture"]
    triggers: ["backend", "endpoint", "service"]

# Domain extensions
domain_extensions:
  web:
    
    # ========== Hook Definitions ==========
    hooks:
      # Inject API docs when QA lists test cases
      - trigger: "qa.list_test_cases"
        action: "inject_context"
        context_id: "api_docs"
        condition: "files.exists('docs/api.yaml') or files.exists('docs/api.md')"
      
      # Check API doc updates when feature is complete
      - trigger: "dev.feature_complete"
        action: "append_checklist"
        context_id: "api_update_check"
        condition: "feature.has_api_change"
      
      # Pre-build checks
      - trigger: "build.pre"
        action: "append_checklist"
        context_id: "build_checklist"
      
      # Post-deploy checks
      - trigger: "build.post"
        action: "inject_context"
        context_id: "deploy_guide"

    # ========== Context Definitions ==========
    contexts:
      # API documentation reference
      api_docs:
        type: "reference"
        source: "docs/api.yaml"
        fallback: "docs/api.md"
        description: "API endpoint documentation"
      
      # API update check
      api_update_check:
        type: "template"
        content: |
          ## API Change Check
          - [ ] Are there any API changes?
          - [ ] Has the API documentation been updated?
          - [ ] Is a version number change needed?
      
      # Build checklist
      build_checklist:
        type: "template"
        content: |
          ## Build Checklist
          - [ ] `{lint_command}` no errors
          - [ ] `{test_command}` tests pass
          - [ ] `{build_command}` build successful
      
      # Deploy guide
      deploy_guide:
        type: "reference"
        source: "docs/DEPLOY.md"
        inline_if_short: true

    # ========== Additional Files ==========
    additional_files:
      - path: "docs/api.md"
        purpose: "API endpoint documentation"
        template: |
          # API Documentation
          
          ## Base URL
          
          - Dev: `http://localhost:3000/api`
          - Prod: `https://api.example.com`
          
          ## Endpoints
          
          ### GET /endpoint
          
          **Description**: 
          
          **Parameters**:
          
          **Response**:
          
          ```json
          {}
          ```
      
      - path: "docs/DEPLOY.md"
        purpose: "Deployment guide"
        template: |
          # Deployment Guide
          
          ## Environments
          
          | Environment | URL | Description |
          |-------------|-----|-------------|
          | dev | localhost:3000 | Local development |
          | staging | staging.example.com | Pre-release |
          | prod | example.com | Production |
          
          ## Deployment Steps
          
          (To be filled)

    # ========== Configuration ==========
    config:
      lint_command: "npm run lint"
      test_command: "npm run test"
      build_command: "npm run build"
      dev_command: "npm run dev"
