kind: changelog
version: "2"

unreleased:
  release_version: "unreleased"
  title: "v0.12.0 (Unreleased)"
  highlights: "YAML-first文档系统、工作流自动化、Insight派生链"
  added:
    - description: "vibecollab docs 命令组: YAML文档管理"
      task_ids: ["TASK-DEV-030"]
      decision_ids: ["DECISION-025", "DECISION-027"]
      details:
        - "docs list: 列出可渲染的YAML文档"
        - "docs render: 渲染YAML到Markdown，支持--all和-k过滤"
        - "docs validate: 验证YAML文档结构"
        - "支持6种文档类型: context, decisions, changelog, roadmap, prd, qa"
        - "YAML是源文件，Markdown是生成的视图"
    
    - description: "vibecollab plan 工作流命令: 预置自动化工作流"
      task_ids: ["TASK-DEV-034"]
      details:
        - "plan list: 列出预置工作流"
        - "plan run: 运行工作流，支持--dry-run和-v详细输出"
        - "plan validate: 验证工作流语法"
        - "3个预置工作流: daily-sync, release-prep, insight-collect"
        - "支持多种host适配器: file_exchange, subprocess, auto:cursor"
    
    - description: "insight graph --show-derivation: Insight派生图可视化"
      task_ids: ["TASK-DEV-036"]
      insight_ids: ["FP-015"]
      details:
        - "显示Insight的派生关系树"
        - "支持Mermaid、JSON、text格式输出"
        - "识别根Insights和派生链"
    
    - description: "insight derive: 自动派生检测"
      task_ids: ["TASK-DEV-036"]
      insight_ids: ["FP-015"]
      details:
        - "创建Insight时自动检测派生关系"
        - "基于任务活动和Insight使用历史"
        - "可配置置信度阈值(--min-confidence)"
        - "支持--dry-run预览派生建议"
        - "支持--derived-from手动指定"
    
    - description: "YAML-first文档系统完整实现"
      task_ids: ["TASK-DEV-030", "TASK-DEV-031", "TASK-DEV-032"]
      decision_ids: ["DECISION-025", "DECISION-027"]
      details:
        - "24个YAML渲染模板"
        - "6种文档类型的Schema定义"
        - "kind + version信封模式(前向兼容)"
        - "YAML→Markdown自动渲染管线"
    
    - description: "Document Template Library: 可复用文档模板"
      task_ids: ["TASK-DEV-033"]
      details:
        - "架构设计文档模板"
        - "发布检查清单模板"
        - "API设计文档模板"
        - "用户故事模板"
    
    - description: "Workflow Integration: 工作流集成"
      task_ids: ["TASK-DEV-034"]
      details:
        - "daily-sync: 日常同步工作流(检查→渲染→提交→推送)"
        - "release-prep: 发布准备工作流(测试→构建→打包→标签)"
        - "insight-collect: Insight收集工作流(索引→建议→导出→提交)"

  changed:
    - description: "v0.12.0版本号更新"
    - description: "测试套件: 1731+测试通过"
    - description: "文档更新: QA_TEST_CASES.md, README.md, USAGE.md, CHANGELOG.md"

  deprecated: []

  removed: []

  fixed:
    - description: "events.jsonl路径问题修复: Windows下目录/文件混淆"
    - description: "MCP onboard工具调用超时问题(部分修复)"

  security: []

  migration_notes:
    - "从v0.11.x迁移到v0.12.0: 参见docs/v0.12.0-migration-guide.md"
    - "Markdown文档现在是YAML的渲染输出，不要手动编辑"
    - "使用vibecollab docs render --all更新所有文档"

releases:
  - release_version: "v0.11.0"
    date: "2026-04-02"
    added:
      - description: "Guard CLI Integration (TASK-DEV-026): `vibecollab check --guards` implemented"
        task_ids: ["TASK-DEV-026"]
        details:
          - "--guards/--no-guards flag (default: on) in check command"
          - "Scans all git-tracked files against guard rules (defaults + project.yaml custom)"
          - "Displays BLOCK violations as errors, WARN as warnings"
          - "Integrated into check summary statistics and exit code"
      - description: "MCP Guard Tools (TASK-DEV-026): Two new MCP tools added"
        task_ids: ["TASK-DEV-026"]
        details:
          - "guard_check(operation, file_path) — Pre-flight check for file operations"
          - "guard_list_rules() — List all configured guard rules"
      - description: "Role CLI Update: Confirmed 8 subcommands (whoami/list/status/switch/permissions/init/sync/conflicts)"
      - description: "TaskManager Permission Enforcement: RoleManager injected into create_task/transition"
        details:
          - "create_task raises PermissionError when role not allowed"
          - "transition returns ValidationResult(ok=False) when role not allowed"
          - "CLI and MCP both inject RoleManager for consistent enforcement"
      - description: "Guards + Hooks Config Validation: SchemaValidator extended with guards/hooks schema"
      - description: "RoleManager Permission Tests (TASK-DEV-029): 69 dedicated unit tests"
        task_ids: ["TASK-DEV-029"]
        details:
          - "test_role_permissions.py: covers _load_permissions_config, get_developer_roles, get_primary_role"
          - "can_create_task_for, can_transition_to, can_write_file, can_approve_decision — all 5 roles verified"
          - "Edge cases: empty config, unknown devs, cache isolation, fnmatch glob, idempotency"
          - "v0.11.0 total: 151 tests across 6 test files"
      - description: "Project Self-Check: vibecollab check all green (11 checks, 0 errors)"
      - description: "Documentation Update: skill.md, README.md, README.pypi.md, README.zh-CN.md synchronized"
        details:
          - "MCP tools count updated 12 → 19"
          - "CLI Reference: vibecollab dev → vibecollab role migration, added hooks commands"
          - "Features section: added Git Hooks + Guard Protection, Multi-Role permissions"
    changed:
      - description: "Version bump: 0.10.13 → 0.11.0"
      - description: "Test suite: 1666 tests passing"

  - release_version: "v0.10.14"
    date: "2026-03-30"
    added:
      - description: "Git Hooks Framework (FP-001): Pre-commit consistency check"
        insight_ids: ["INS-039"]
        details:
          - "Implemented .git/hooks/pre-commit with vibecollab check and local build verification"
          - "Every commit auto-validates insight consistency and runs ruff + pytest"
      - description: "Guard Protection Engine (FP-008): Core engine implemented"
        insight_ids: ["INS-040"]
        details:
          - "GuardEngine class with check_operation(), check_batch(), list_rules(), test_path()"
          - "GuardSeverity enum: block/warn/allow"
          - "4 default rules: meta_protection, library_protection, insight_protection, temp_warning"
      - description: "Git Hooks CLI Commands (FP-001): Full CLI implemented"
        details:
          - "HookManager domain module with install/uninstall/run/status/list methods"
          - "Windows PowerShell + Unix Bash dual template support"
          - "Supports 5 hook types: pre-commit, pre-push, post-commit, post-checkout, prepare-commit-msg"
      - description: "Dynamic Skill Registration (DEV-027): SkillRegistry module"
      - description: "Insight Trigger Registry: New module + CLI"
      - description: "Strict Document-Code Sync: Linked groups + Git commit level"
        insight_ids: ["INS-042"]
      - description: "Commit-Type-Based Dynamic Check: Context-aware strictness"
        insight_ids: ["INS-043"]
      - description: "Role-Driven Architecture Implementation (DEV-027)"
        insight_ids: ["INS-044", "INS-045"]
    changed:
      - description: "Documentation Update: README.md and skill.md synchronized"
        insight_ids: ["INS-041"]
      - description: "Task-Insight Best Practices: Systematic workflow"
        insight_ids: ["INS-036", "INS-037", "INS-038", "INS-046"]
    fixed:
      - description: "Import order in cli/main.py (ruff I001)"
      - description: "Pre-commit hook now includes local build checks (ruff + pytest)"
      - description: "All 1515 tests passing"

  - release_version: "v0.10.13"
    date: "2026-03-27"
    fixed:
      - description: "Role-based architecture: Complete DeveloperManager → RoleManager migration"
      - description: "Test suite: Fix 33 failing tests, achieve 99.7% pass rate (1510/1515)"
      - description: "Conflict detector: Update parameter names (developers → roles)"
      - description: "Pattern engine: Update section titles and conditions for role_context"
      - description: "Context aggregator: Update terminology (developer → role)"
      - description: "CLI commands: Rename dev → role throughout codebase"
      - description: "Default paths: Update docs/developers → docs/roles"
    changed:
      - description: "BREAKING: vibecollab dev → vibecollab role CLI commands"
      - description: "BREAKING: docs/developers/ → docs/roles/ directory structure"

  - release_version: "v0.10.12"
    date: "2026-03-27"
    added:
      - description: "IDE Skill Injection: Support for Cursor, Cline, CodeBuddy, OpenCode, and 'all' option"
      - description: "GitHub Actions PyPI auto-publish fix (Trusted Publishing)"

