# Extension Mechanism Schema Definition
# Extension = Workflow Hooks + Context Injection + Reference Documents

extension:
  type: object
  description: Domain extension definition
  properties:
    
    # ============================================
    # Hook Definitions: What action to trigger at what point
    # ============================================
    hooks:
      type: array
      description: Workflow hook list
      items:
        type: object
        required: [trigger, action]
        properties:
          trigger:
            type: string
            description: Trigger point identifier
            enum:
              # Dialogue lifecycle
              - "dialogue.start"           # Dialogue start
              - "dialogue.end"             # Dialogue end
              # QA workflow
              - "qa.list_test_cases"       # When listing test cases
              - "qa.acceptance"            # During acceptance testing
              # Development workflow
              - "dev.feature_complete"     # When feature is complete
              - "dev.before_implement"     # Before implementation
              # Build workflow
              - "build.pre"                # Before build
              - "build.post"               # After build
              # Milestone
              - "milestone.review"         # Milestone review
              - "milestone.planning"       # Milestone planning
          
          action:
            type: string
            description: Action to execute
            enum:
              - "inject_context"           # Inject context
              - "append_checklist"         # Append checklist items
              - "require_file_read"        # Require file reading
              - "update_file"              # Update file
          
          context_id:
            type: string
            description: Associated context ID (required when action=inject_context)
          
          condition:
            type: string
            description: Trigger condition expression
            examples:
              - "project.domain == 'game'"
              - "project.has_feature('gm_console')"
              - "files.exists('docs/GM_COMMANDS.md')"
          
          priority:
            type: integer
            default: 0
            description: Execution priority (higher = earlier)

    # ============================================
    # Context Definitions: What content to inject
    # ============================================
    contexts:
      type: object
      description: Context dictionary, key is context_id
      additionalProperties:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum:
              - "reference"    # Reference external document
              - "template"     # Inline template
              - "computed"     # Dynamically computed
              - "file_list"    # File list
          
          # When type=reference
          source:
            type: string
            description: Referenced document path
          section:
            type: string
            description: Reference only a specific section of the document
          inline_if_short:
            type: boolean
            default: true
            description: Display inline when content is short
          
          # When type=template
          content:
            type: string
            description: Template content, supports {variable} placeholders
          
          # When type=computed
          from:
            type: string
            description: Data source path
          transform:
            type: string
            description: Transform expression

    # ============================================
    # Additional Files: Domain-specific documents
    # ============================================
    additional_files:
      type: array
      description: Additional document files needed by the domain
      items:
        type: object
        properties:
          path:
            type: string
          purpose:
            type: string
          template:
            type: string
            description: File template content or template file path

    # ============================================
    # Role Override/Append
    # ============================================
    roles_override:
      type: array
      description: Override or append role definitions
      items:
        $ref: "#/definitions/role"

# ============================================
# Common Definitions
# ============================================
definitions:
  role:
    type: object
    required: [code, name]
    properties:
      code:
        type: string
      name:
        type: string
      focus:
        type: array
        items:
          type: string
      triggers:
        type: array
        items:
          type: string
      is_gatekeeper:
        type: boolean
        default: false
