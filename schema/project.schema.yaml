# LLM Collaboration Protocol Schema v1.0
# Project configuration YAML Schema definition

project:
  type: object
  required: [name, version, domain]
  properties:
    name:
      type: string
      description: Project name
    version:
      type: string
      pattern: "^v\\d+\\.\\d+$"
      description: Protocol version
    domain:
      type: string
      description: Business domain identifier (game/web/mobile/data/infra/...)
    description:
      type: string
      description: Project description

# ============================================
# 1. Philosophy
# ============================================
philosophy:
  type: object
  properties:
    vibe_development:
      type: object
      description: Vibe Development philosophy configuration
      properties:
        enabled:
          type: boolean
          default: true
        principles:
          type: array
          items:
            type: string
          description: Core principles list
    decision_quality:
      type: object
      properties:
        target_rate:
          type: number
          minimum: 0.8
          maximum: 1.0
          default: 0.9
          description: Decision accuracy target
        critical_tolerance:
          type: integer
          default: 0
          description: Critical decision error tolerance count
    long_term_dialogue:
      type: boolean
      default: true
      description: Whether to enable long-term dialogue engineering mode

# ============================================
# 2. Roles
# ============================================
roles:
  type: array
  items:
    type: object
    required: [code, name, focus]
    properties:
      code:
        type: string
        pattern: "^[A-Z]+$"
        description: Role code (e.g. DESIGN, ARCH, DEV)
      name:
        type: string
        description: Role name
      focus:
        type: array
        items:
          type: string
        description: Focus areas
      triggers:
        type: array
        items:
          type: string
        description: Trigger keywords
      is_gatekeeper:
        type: boolean
        default: false
        description: Whether this is a gatekeeper role (e.g. QA)

# ============================================
# 3. Decision Levels
# ============================================
decision_levels:
  type: array
  items:
    type: object
    required: [level, name, scope, review]
    properties:
      level:
        type: string
        enum: [S, A, B, C]
        description: Decision level
      name:
        type: string
        description: Decision type name
      scope:
        type: string
        description: Impact scope description
      review:
        type: object
        properties:
          required:
            type: boolean
          mode:
            type: string
            enum: [sync, async, auto, none]
          human_confirm:
            type: boolean

# ============================================
# 4. Task Unit
# ============================================
task_unit:
  type: object
  properties:
    id_pattern:
      type: string
      default: "TASK-{role}-{seq}"
      description: Task ID pattern
    statuses:
      type: array
      items:
        type: string
      default: [TODO, IN_PROGRESS, REVIEW, DONE]
    required_fields:
      type: array
      items:
        type: string
      default: [id, role, feature, dependencies, output, status]

# ============================================
# 5. Dialogue Protocol
# ============================================
dialogue_protocol:
  type: object
  properties:
    on_start:
      type: object
      description: Required actions at dialogue start
      properties:
        read_files:
          type: array
          items:
            type: string
          description: Files that must be read
        actions:
          type: array
          items:
            type: string
    on_end:
      type: object
      description: Required actions at dialogue end
      properties:
        update_files:
          type: array
          items:
            type: string
        git_commit:
          type: boolean
          default: true
    standard_flow:
      type: array
      items:
        type: object
        properties:
          step:
            type: integer
          actor:
            type: string
            enum: [human, ai]
          action:
            type: string
          condition:
            type: string

# ============================================
# 6. Git Workflow
# ============================================
git_workflow:
  type: object
  properties:
    branches:
      type: object
      properties:
        main:
          type: string
          description: Main branch name
        dev:
          type: string
        feature_prefix:
          type: string
          default: "feature/"
        fix_prefix:
          type: string
          default: "fix/"
    commit_prefixes:
      type: array
      items:
        type: object
        properties:
          prefix:
            type: string
          description:
            type: string
          roles:
            type: array
            items:
              type: string
    commit_required:
      type: boolean
      default: true
      description: Whether commit is required after each dialogue

# ============================================
# 7. Testing
# ============================================
testing:
  type: object
  properties:
    # 7.1 Unit Test (developer perspective)
    unit_test:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        framework:
          type: string
          description: Test framework (jest/pytest/mocha/...)
        coverage_target:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
        patterns:
          type: array
          items:
            type: string
          description: Test file matching patterns
        run_on:
          type: array
          items:
            type: string
            enum: [pre-commit, pre-push, ci, manual]
    # 7.2 Product QA (user perspective)
    product_qa:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        test_case_file:
          type: string
          default: "docs/QA_TEST_CASES.md"
        case_id_pattern:
          type: string
          default: "TC-{module}-{seq}"
        required_fields:
          type: array
          items:
            type: string
          default: [id, feature, precondition, steps, expected, status]
        statuses:
          type: array
          items:
            type: string
          default: [PASS, PARTIAL, FAIL, SKIP]

# ============================================
# 8. Milestone
# ============================================
milestone:
  type: object
  properties:
    lifecycle:
      type: array
      items:
        type: object
        properties:
          phase:
            type: string
          description:
            type: string
          exit_criteria:
            type: array
            items:
              type: string
    tag_pattern:
      type: string
      default: "v{major}.{minor}.{patch}"
    roadmap_file:
      type: string
      default: "docs/ROADMAP.md"

# ============================================
# 9. Iteration
# ============================================
iteration:
  type: object
  properties:
    suggestion_pool:
      type: object
      properties:
        file:
          type: string
          default: "docs/ROADMAP.md"
        categories:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              meaning:
                type: string
          default:
            - symbol: "✅"
              meaning: "Include in current milestone"
            - symbol: "⏳"
              meaning: "Defer to next milestone"
            - symbol: "❌"
              meaning: "Reject"
            - symbol: "🔄"
              meaning: "Merge with other iteration"
    config_level_iteration:
      type: object
      description: Config-level iteration (value changes only, no logic changes)
      properties:
        enabled:
          type: boolean
          default: true
        commit_prefix:
          type: string
          default: "[CONFIG]"
        skip_pm_review:
          type: boolean
          default: true

# ============================================
# 10. Documentation
# ============================================
documentation:
  type: object
  properties:
    key_files:
      type: array
      items:
        type: object
        properties:
          path:
            type: string
          purpose:
            type: string
          update_trigger:
            type: string
          max_stale_days:
            type: number
            description: "Optional. Maximum days a file can go without updates before check reports a warning"
    context_file:
      type: string
      default: "docs/CONTEXT.md"
    changelog_file:
      type: string
      default: "docs/CHANGELOG.md"
    decisions_file:
      type: string
      default: "docs/DECISIONS.md"
