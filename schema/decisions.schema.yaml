# VibeCollab Decisions Schema v1
# Defines structure for docs/decisions.yaml
#
# Design goals:
#   - Structured decision records with levels, options, rationale
#   - Descriptive fields (problem, rationale, context) as free-form strings
#   - Support pending → confirmed → revised lifecycle
#   - Forward-compatible via version field

decisions:
  type: object
  required: [kind, version, decisions]
  properties:
    kind:
      type: string
      const: "decisions"
      description: Fixed type identifier

    version:
      type: string
      default: "1"
      description: Schema version for migration compatibility

    decisions:
      type: array
      description: All decision records, newest first
      items:
        $ref: "#/decision"

    archive:
      type: array
      description: Archived / superseded decisions
      items:
        $ref: "#/decision"

# ============================================
# Decision Record
# ============================================
decision:
  type: object
  required: [id, date, level, status, problem, decision_text]
  properties:
    id:
      type: string
      pattern: "^DECISION-\\d{3,}$"
      description: Decision ID (e.g. "DECISION-019")

    title:
      type: string
      description: Decision title

    date:
      type: string
      format: date
      description: Decision date

    level:
      type: string
      enum: [S, A, B, C]
      description: >
        Decision level:
        S = Strategic (overall direction),
        A = Architecture (system design),
        B = Implementation (approach selection),
        C = Detail (parameters, naming)

    status:
      type: string
      enum: [pending, confirmed, revised, superseded]
      description: Decision lifecycle status

    role:
      type: string
      description: Role that owns this decision (e.g. "ARCH", "DEV")

    # --- Descriptive content (free-form for AI understanding) ---
    context:
      type: string
      description: Background context explaining why this decision is needed

    problem:
      type: string
      description: The problem or question requiring a decision

    options:
      type: array
      description: Options considered
      items:
        type: object
        required: [label, description]
        properties:
          label:
            type: string
            description: Option identifier (e.g. "A", "B", "Big-Bang")
          description:
            type: string
            description: Option description (free-form)
          pros:
            type: array
            items:
              type: string
          cons:
            type: array
            items:
              type: string

    decision_text:
      type: string
      description: The final decision made (free-form, rich description)

    rationale:
      type: string
      description: Why this option was chosen (free-form)

    consequences:
      type: string
      description: Expected consequences and follow-up actions

    # --- References ---
    related_decisions:
      type: array
      items:
        type: string
      description: Related decision IDs

    related_tasks:
      type: array
      items:
        type: string
      description: Associated task IDs

    related_insights:
      type: array
      items:
        type: string
      description: Associated insight IDs

    # --- Validation (for B-level completion decisions) ---
    validation:
      type: object
      description: Validation results (optional, for milestone/completion decisions)
      properties:
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              result:
                type: string
                enum: [pass, fail, skip]
              details:
                type: string

    notes:
      type: string
      description: Additional notes
