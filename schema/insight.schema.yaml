# VibeCollab Insight Schema v1
# Insight system data structure definition
#
# Insight = Reusable knowledge unit distilled from development practice
# Design goals:
#   - Separate insight entity from project usage state
#   - Enable future cross-project distribution as standalone package
#   - Support association with actual tools/scripts (artifacts)
#   - Drive matching and recommendations through Tag system

# ============================================
# 1. Insight Entity (knowledge unit, portable)
# ============================================
insight:
  type: object
  required: [kind, version, id, title, tags, category, body, origin]
  properties:
    kind:
      type: string
      const: "insight"
      description: Fixed type identifier

    version:
      type: string
      default: "1"
      description: Schema version number for cross-project migration compatibility

    id:
      type: string
      pattern: "^INS-\\d{3,}$"
      description: Globally unique ID, format INS-001, INS-002, ...

    # --- Description ---
    title:
      type: string
      description: Concise title

    summary:
      type: string
      description: One-line summary

    tags:
      type: array
      items:
        type: string
      minItems: 1
      description: Tag list, drives matching and recommendations

    category:
      type: string
      enum:
        - technique      # Technical approach (e.g. template replacing hardcoded values)
        - workflow        # Workflow pattern (e.g. Plan→Execute→Solidify)
        - decision        # Decision pattern (how to make tech choices)
        - debug           # Debugging experience (how to troubleshoot certain issues)
        - tool            # Tool usage (best practices for a tool)
        - integration     # Integration pattern (how modules collaborate)
      description: Insight category

    # --- Knowledge Body ---
    body:
      type: object
      required: [scenario, approach]
      description: Knowledge body, Jinja2 templatable, context injectable at render time
      properties:
        scenario:
          type: string
          description: Applicable scenario description
        approach:
          type: string
          description: Method/steps (supports Markdown and multi-line text)
        validation:
          type: string
          description: Validation method (how to confirm this insight is effective)
        constraints:
          type: array
          items:
            type: string
          description: Usage constraints/prerequisites
        notes:
          type: string
          description: Additional notes

    # --- Artifacts ---
    artifacts:
      type: array
      default: []
      description: Associated tools, scripts, configurations, and other artifacts
      items:
        type: object
        required: [path, type]
        properties:
          path:
            type: string
            description: Artifact relative path (relative to insight directory)
          type:
            type: string
            enum:
              - script       # Executable script
              - template     # Jinja2 template
              - config       # Configuration file
              - schema       # Schema definition
              - reference    # Reference document
            description: Artifact type
          runtime:
            type: string
            description: Execution environment (python3 / node / bash / ...)
          description:
            type: string

    # --- Provenance ---
    origin:
      type: object
      required: [created_by, created_at]
      description: |
        Source tracking. Design principle: provenance info must be self-describing,
        not dependent on any project's internal ID system.
        Insight entities may be reused across projects, so source descriptions
        should be understandable without original project context.
      properties:
        created_by:
          type: string
          description: Creator (developer ID)
        created_at:
          type: string
          format: date
          description: Creation date
        context:
          type: string
          description: Natural language description of creation context (e.g. "VibeCollab v0.7.0 Insight system architecture design")
        source:
          type: object
          description: |
            Direct source of the insight. All fields are optional, but it's recommended
            to fill at least type + description.
            - description is self-describing natural language, readable by anyone across projects
            - ref is the source project's internal ID (hint only, can be ignored cross-project)
            - url is an externally accessible link (e.g. GitHub issue/PR/doc URL)
            - project marks the source project name
          properties:
            type:
              type: string
              enum:
                - task        # Distilled from a task
                - decision    # Distilled from a decision
                - insight     # Derived from existing insights
                - external    # Imported from external source
            description:
              type: string
              description: Natural language description of the source, ensuring cross-project readability
            ref:
              type: string
              description: Source project internal ID (optional hint, e.g. DECISION-012, TASK-DEV-001)
            url:
              type: string
              format: uri
              description: Externally accessible link (e.g. GitHub issue/PR URL)
            project:
              type: string
              description: Source project name
        derived_from:
          type: array
          items:
            type: string
          default: []
          description: Insight IDs this was derived from (provenance chain)

    # --- Integrity ---
    fingerprint:
      type: string
      description: SHA-256 content hash, auto-computed by tooling

# ============================================
# 2. Project Registry (project-level usage state)
# ============================================
registry:
  type: object
  required: [schema_version, entries]
  description: |
    Project's usage state of the insight library.
    Separated from insight entity; the same insight has independent registry state in different projects.
  properties:
    schema_version:
      type: string
      default: "1"

    entries:
      type: object
      additionalProperties:
        type: object
        required: [weight, active]
        properties:
          weight:
            type: number
            minimum: 0.0
            default: 1.0
            description: |
              Usage weight.
              Each use: +0.1 (reward). Each decay cycle: *decay_rate (decay).
              When weight < deactivate_threshold, auto-set active=false.
          used_count:
            type: integer
            minimum: 0
            default: 0
            description: Usage count
          last_used_at:
            type: string
            format: date-time
            description: Last used timestamp
          last_used_by:
            type: string
            description: Last user (developer ID)
          active:
            type: boolean
            default: true
            description: Whether enabled. Disabled when weight too low or manually turned off

    # Registry-level settings
    settings:
      type: object
      properties:
        decay_rate:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.95
          description: Weight decay coefficient per cycle
        decay_interval_days:
          type: integer
          default: 30
          description: Decay cycle (days)
        use_reward:
          type: number
          default: 0.1
          description: Weight reward per use
        deactivate_threshold:
          type: number
          default: 0.1
          description: Auto-deactivate when weight falls below this threshold

# ============================================
# 3. Developer Tag Extension (.metadata.yaml additions)
# ============================================
developer_tags:
  type: object
  description: |
    Developer Tag system extension, appended to existing .metadata.yaml.
    Tags are open-ended, no predefined enums.
    Specific tags can be recognized by the workflow engine and influence decision behavior.
  properties:
    tags:
      type: array
      items:
        type: string
      description: |
        Developer tag list. Examples:
        - "arch"          → architecture expertise
        - "python"        → tech stack
        - "test-first"    → influences decisions: write tests first
        - "cautious"      → influences decisions: conservative style
        - "no-breaking-change" → influences decisions: no breaking changes
    contributed:
      type: array
      items:
        type: string
      description: Insight IDs created by this developer
    bookmarks:
      type: array
      items:
        type: string
      description: Insight IDs bookmarked/frequently used by this developer
