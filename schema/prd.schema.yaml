# VibeCollab PRD Schema v1
# Defines structure for docs/prd.yaml
#
# Design goals:
#   - Structured requirement records with lifecycle tracking
#   - Preserve original descriptions (for traceability)
#   - Change history for requirement evolution
#   - Forward-compatible via version field

prd:
  type: object
  required: [kind, version, requirements]
  properties:
    kind:
      type: string
      const: "prd"
      description: Fixed type identifier

    version:
      type: string
      default: "1"
      description: Schema version for migration compatibility

    updated_at:
      type: string
      format: date
      description: Last update date

    requirements:
      type: array
      description: All requirements
      items:
        $ref: "#/requirement"

    statistics:
      type: object
      description: Auto-computed requirement statistics (optional, can be derived)
      properties:
        draft:
          type: integer
          default: 0
        confirmed:
          type: integer
          default: 0
        in_progress:
          type: integer
          default: 0
        completed:
          type: integer
          default: 0
        cancelled:
          type: integer
          default: 0

# ============================================
# Requirement
# ============================================
requirement:
  type: object
  required: [id, title, status, priority]
  properties:
    id:
      type: string
      pattern: "^REQ-\\d{3,}$"
      description: Requirement ID (e.g. "REQ-001")

    title:
      type: string
      description: Concise requirement name

    original_description:
      type: string
      description: >
        User's initial requirement description, preserved verbatim.
        This field should never be modified after creation.

    current_description:
      type: string
      description: Refined description after clarification and evolution

    status:
      type: string
      enum: [draft, confirmed, in_progress, completed, cancelled]
      description: Requirement lifecycle status

    priority:
      type: string
      enum: [high, medium, low]
      description: Requirement priority

    created_at:
      type: string
      format: date
      description: When the requirement was first recorded

    updated_at:
      type: string
      format: date
      description: When the requirement was last modified

    # --- Analysis (from requirement clarification protocol) ---
    analysis:
      type: object
      description: Structured analysis from requirement clarification
      properties:
        goal:
          type: string
          description: What to achieve
        scenario:
          type: string
          description: Under what circumstances
        user:
          type: string
          description: Who will use it

    functional_requirements:
      type: array
      items:
        type: string
      description: Specific functional requirements

    acceptance_criteria:
      type: array
      description: Verifiable acceptance criteria
      items:
        type: object
        required: [criterion]
        properties:
          criterion:
            type: string
          met:
            type: boolean
            default: false

    # --- Traceability ---
    task_ids:
      type: array
      items:
        type: string
      description: Associated Task IDs

    decision_level:
      type: string
      enum: [S, A, B, C]
      description: Decision level for this requirement

    estimated_complexity:
      type: string
      enum: [high, medium, low]

    # --- Change History ---
    change_history:
      type: array
      description: Record of requirement changes
      items:
        type: object
        required: [date, change]
        properties:
          date:
            type: string
            format: date
          change:
            type: string
            description: What changed
          reason:
            type: string
            description: Why it changed
