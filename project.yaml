project:
  name: VibeCollab
  version: v1.0
  domain: generic
  description: Project description
philosophy:
  vibe_development:
    enabled: true
    principles:
    - AI is not an executor but a collaboration partner
    - Don't rush to produce code -- first align understanding
    - Every decision is a result of shared thinking
    - The conversation itself is part of the design process
  decision_quality:
    target_rate: 0.9
    critical_tolerance: 0
  long_term_dialogue: true
roles:
- code: DESIGN
  name: Product Design
  focus:
  - requirements
  - experience
  - interaction
  triggers:
  - design
  - requirements
  - product
  is_gatekeeper: false
- code: ARCH
  name: Architecture
  focus:
  - infrastructure
  - performance
  - extensibility
  triggers:
  - architecture
  - infrastructure
  - refactor
  is_gatekeeper: false
- code: DEV
  name: Development
  focus:
  - implementation
  - bug fixing
  triggers:
  - develop
  - implement
  - code
  is_gatekeeper: false
- code: PM
  name: Project Management
  focus:
  - milestones
  - priorities
  - progress
  triggers:
  - plan
  - schedule
  - priority
  is_gatekeeper: false
- code: QA
  name: Product Quality Assurance
  focus:
  - acceptance testing
  - user experience validation
  - edge cases
  triggers:
  - acceptance
  - experience testing
  - feature verification
  is_gatekeeper: true
- code: TEST
  name: Unit Testing
  focus:
  - code testing
  - coverage
  - automated testing
  triggers:
  - unit test
  - test case
  - coverage
  is_gatekeeper: false
decision_levels:
- level: S
  name: Strategic Decision
  scope: Overall direction, core features
  review:
    required: true
    mode: sync
    human_confirm: true
- level: A
  name: Architecture Decision
  scope: System design, data structures
  review:
    required: true
    mode: async
    human_confirm: true
- level: B
  name: Implementation Decision
  scope: Specific approach selection
  review:
    required: false
    mode: auto
    human_confirm: false
- level: C
  name: Detail Decision
  scope: Parameters, naming, formatting
  review:
    required: false
    mode: none
    human_confirm: false
task_unit:
  id_pattern: TASK-{role}-{seq}
  statuses:
  - TODO
  - IN_PROGRESS
  - REVIEW
  - DONE
  required_fields:
  - id
  - role
  - feature
  - dependencies
  - output
  - status
  - dialogue_rounds
dialogue_protocol:
  on_start:
    read_files:
    - docs/CONTEXT.md
    - CONTRIBUTING_AI.md
    actions:
    - Understand current progress
    - Confirm user's goal for this conversation
  on_end:
    update_files:
    - docs/CONTEXT.md
    - docs/CHANGELOG.md
    git_commit: true
  standard_flow:
  - step: 1
    actor: human
    action: Raise a requirement or question
  - step: 2
    actor: ai
    action: Identify role, analyze the problem
  - step: 3
    actor: ai
    action: Request confirmation for S/A level decisions, execute B/C autonomously
    condition: decision_level in [S, A]
  - step: 4
    actor: ai
    action: Execute task, produce output
  - step: 5
    actor: ai
    action: Update test cases (if feature development)
    condition: task_type == feature
  - step: 6
    actor: ai
    action: Summarize progress, suggest next steps
  - step: 7
    actor: human
    action: Confirm / correct / continue
  - step: 8
    actor: ai
    action: Git commit record
requirement_clarification:
  enabled: true
  trigger_conditions:
  - Description is vague or incomplete
  - Missing specific acceptance criteria
  - Could be interpreted in multiple ways
  - Involves S/A level decisions
  clarification_questions:
  - What outcome are you hoping to achieve?
  - Do you have any reference examples?
  - Who will use this feature? In what scenario?
  - How would you verify this feature is complete?
  - Are there time or resource constraints?
git_workflow:
  branches:
    main: main
    dev: dev
    feature_prefix: feature/
    fix_prefix: fix/
    design_prefix: design/
    refactor_prefix: refactor/
  commit_prefixes:
  - prefix: 'design:'
    description: Design document changes
    roles:
    - DESIGN
    doc_requirements:
      - docs/ROADMAP.md
      - docs/DECISIONS.md
    severity: warning
    reason: Design changes should update planning and decision docs
  - prefix: 'arch:'
    description: Architecture adjustments
    roles:
    - ARCH
    doc_requirements:
      - docs/ROADMAP.md
      - docs/DECISIONS.md
      - docs/CONTEXT.md
    severity: error
    reason: Architecture decisions must update roadmap, decisions, and context
  - prefix: 'feat:'
    description: New features
    roles:
    - DEV
    doc_requirements:
      - docs/CONTEXT.md
      - docs/CHANGELOG.md
      - docs/QA_TEST_CASES.md
    severity: error
    reason: Features require context, changelog, and test coverage
  - prefix: 'fix:'
    description: Bug fixes
    roles:
    - DEV
    - QA
    doc_requirements:
      - docs/CHANGELOG.md
      - docs/QA_TEST_CASES.md
    severity: error
    reason: Bug fixes need changelog and regression tests
  - prefix: 'config:'
    description: Config adjustments (no logic changes)
    roles:
    - DEV
    doc_requirements: []
    severity: info
    reason: Config changes don't require documentation updates
  - prefix: 'refactor:'
    description: Refactoring
    roles:
    - ARCH
    - DEV
    doc_requirements:
      - docs/CONTEXT.md
    severity: warning
    reason: Major refactoring should document architectural changes
  - prefix: 'docs:'
    description: Documentation updates
    roles:
    - PM
    - DESIGN
    doc_requirements:
      - docs/ROADMAP.md
      - docs/CHANGELOG.md
    severity: warning
    reason: Doc updates should sync planning and changelog
  - prefix: 'test:'
    description: Test related
    roles:
    - TEST
    - QA
    doc_requirements:
      - docs/QA_TEST_CASES.md
    severity: warning
    reason: Test changes should update test case documentation
  - prefix: 'chore:'
    description: Maintenance and workflow updates
    roles:
    - PM
    - DEV
    doc_requirements:
      - docs/CHANGELOG.md
    severity: info
    reason: Maintenance changes should update changelog
  - prefix: 'revert:'
    description: Revert previous changes
    roles:
    - DEV
    - ARCH
    doc_requirements:
      - docs/CHANGELOG.md
    severity: warning
    reason: Reverts should be documented in changelog
  commit_required: true
testing:
  unit_test:
    enabled: true
    framework: jest
    coverage_target: 0.8
    patterns:
    - '**/*.test.ts'
    - '**/*.spec.ts'
    run_on:
    - pre-commit
    - ci
    required_for_merge: true
  product_qa:
    enabled: true
    test_case_file: docs/QA_TEST_CASES.md
    case_id_pattern: TC-{module}-{seq}
    required_fields:
    - id
    - feature
    - precondition
    - steps
    - expected
    - status
    statuses:
    - symbol: 🟢
      meaning: PASS
    - symbol: 🟡
      meaning: PARTIAL
    - symbol: 🔴
      meaning: FAIL
    - symbol: ⚪
      meaning: SKIP
milestone:
  lifecycle:
  - phase: feature_dev
    description: Feature development period
    exit_criteria:
    - All planned features completed
    - Quick acceptance passed
  - phase: feature_freeze
    description: Feature freeze
    exit_criteria:
    - No new features added
    - Build successful
  - phase: bug_fix
    description: Bug fix period
    exit_criteria:
    - P0/P1 issues cleared
    - Test pass rate meets target
  - phase: acceptance
    description: Milestone acceptance
    exit_criteria:
    - QA full test pass
    - Unit test coverage meets target
    - Known issues cleared or deferred
  - phase: retrospective
    description: Version retrospective
    exit_criteria:
    - Review test performance
    - Collect user feedback
    - Add new requirements to next phase
  tag_pattern: v{major}.{minor}.{patch}
  roadmap_file: docs/ROADMAP.md
  bug_priority:
  - level: P0
    description: Crash / blocker
  - level: P1
    description: Feature malfunction
  - level: P2
    description: Experience issue
  - level: P3
    description: Optimization suggestion
iteration:
  suggestion_pool:
    file: docs/ROADMAP.md
    section: Iteration Suggestion Pool
    categories:
    - symbol: ✅
      meaning: Include in current milestone
    - symbol: ⏳
      meaning: Defer to next milestone
    - symbol: ❌
      meaning: Reject (doesn't align with direction)
    - symbol: 🔄
      meaning: Merge with other iteration
  config_level_iteration:
    enabled: true
    commit_prefix: 'chore:'
    skip_pm_review: true
    examples:
    - Numeric parameter adjustments
    - Config file modifications
    - Style / theme changes
    - Copy / text modifications
  review_dimensions:
  - Dependency / conflict with current tasks
  - Impact on user experience
  - Development cost and technical complexity
  - Remaining time constraints for milestone
version_review:
  enabled: true
  timing: After milestone acceptance is complete
  review_items:
  - Test performance (pass rate, issue distribution)
  - User experience feedback
  - Technical debt
  - Iteration suggestion pool
build:
  enabled: true
  command: npm run build
  dist_entry: dist/index.html
  timing:
  - Before milestone full acceptance
  - During bug fix period for concentrated testing
  - When preparing distribution / demo version
quick_acceptance:
  enabled: true
  start_command: npm run dev
  reply_formats:
    pass: ✅
    issue: '⚠️ Issue:'
    skip: Skip
prompt_engineering:
  enabled: true
  role_templates:
    DESIGN: '[DESIGN] I''d like to discuss the design of {system_name}

      Current thinking: {description}

      Main concerns: {concerns}

      Please analyze from a user experience perspective

      '
    ARCH: '[ARCH] I need to design the architecture for {module_name}

      Requirements: {functional_requirements}

      Constraints: {performance_compatibility_constraints}

      Please provide 2-3 approaches for comparison

      '
    DEV: '[DEV] Please implement {feature}

      Input: {input_description}

      Output: {expected_output}

      Related files: {file_paths}

      '
confirmed_decisions: []
contributing_ai_changelog: []
documentation:
  consistency:
    enabled: true
    default_level: local_mtime
    linked_groups:
      - name: core_context
        level: git_commit
        files:
          - docs/CONTEXT.md
          - docs/CHANGELOG.md
        description: Core context and changelog must sync with code changes
      
      - name: planning_docs
        level: git_commit
        files:
          - docs/ROADMAP.md
          - docs/DECISIONS.md
        description: Planning and decision docs must reflect committed state
      
      - name: qa_sync
        level: git_commit
        files:
          - docs/QA_TEST_CASES.md
        description: QA test cases must match committed features
  
  key_files:
  - path: CONTRIBUTING_AI.md
    purpose: AI collaboration rules, top-level guidance
    update_trigger: When collaboration approach evolves
  - path: llms.txt
    purpose: Project context summary (llmstxt.org standard)
    update_trigger: When project info changes
  - path: docs/CONTEXT.md
    purpose: Current development context
    update_trigger: End of every conversation
  - path: docs/DECISIONS.md
    purpose: Important decision records
    update_trigger: After every S/A level decision
  - path: docs/CHANGELOG.md
    purpose: Version changelog
    update_trigger: After every productive conversation
  - path: docs/QA_TEST_CASES.md
    purpose: Product QA test cases
    update_trigger: When each feature is completed
  - path: docs/PRD.md
    purpose: Product requirements document
    update_trigger: When requirements change
  - path: docs/ROADMAP.md
    purpose: Roadmap + iteration suggestions
    update_trigger: During milestone planning / feedback
  context_file: docs/CONTEXT.md
  changelog_file: docs/CHANGELOG.md
  decisions_file: docs/DECISIONS.md
role_context:
  enabled: true
  current_role: dev
  context:
    per_role_dir: docs/roles
    global_aggregation: true
    aggregation_file: docs/CONTEXT.md
    metadata_file: .metadata.yaml
    auto_sync: true
  collaboration:
    enabled: true
    file: docs/roles/COLLABORATION.md
    track_dependencies: true
    track_handoffs: true
  dialogue_protocol:
    on_start:
      read_files:
      - docs/CONTEXT.md
      - docs/roles/{role}/CONTEXT.md
      - docs/roles/COLLABORATION.md
      - CONTRIBUTING_AI.md
    on_end:
      update_files:
      - docs/roles/{role}/CONTEXT.md
      - docs/CHANGELOG.md
      aggregate_context: true
      git_commit: true
  role_assignments:
    - role: dev
      description: Core development work
      insights: []
      preferences: {}
    - role: insight_collector
      description: Collect and organize insights
      insights:
        - INS-001
        - INS-002
        - INS-003
      preferences:
        auto_suggest: true
    - role: architect
      description: System design and architecture
      insights: []
      preferences: {}
insight:
  enabled: true
protocol_check:
  enabled: true
  checks:
    git:
      enabled: true
      check_uncommitted: true
      check_commit_frequency: true
    documentation:
      enabled: true
      check_file_existence: true
      check_update_frequency: true
      update_threshold_hours: 24
    dialogue:
      enabled: true
      check_required_files: true
  trigger_words:
  - check protocol
  - protocol check
  - verify protocol compliance
  - self-check
prd_management:
  enabled: true
  prd_file: docs/PRD.md
  requirement_statuses:
  - draft
  - confirmed
  - in_progress
  - completed
  - cancelled
  priorities:
  - high
  - medium
  - low
  trigger_words:
  - record requirement
  - update PRD
  - view requirements
  - requirement status
  - PRD
  - requirements document
symbology:
  decision_status:
  - symbol: PENDING
    meaning: Pending confirmation
  - symbol: CONFIRMED
    meaning: Confirmed
  - symbol: REVISED
    meaning: Revised
  task_status:
  - symbol: TODO
    meaning: Not started
  - symbol: IN_PROGRESS
    meaning: In progress
  - symbol: REVIEW
    meaning: Pending review
  - symbol: DONE
    meaning: Completed
  test_status:
  - symbol: 🟢
    meaning: Pass
  - symbol: 🟡
    meaning: Partial pass
  - symbol: 🔴
    meaning: Fail
  - symbol: ⚪
    meaning: Skip
  priority:
  - symbol: P0
    meaning: Highest priority / blocker
  - symbol: P1
    meaning: High priority
  - symbol: P2
    meaning: Medium priority
  - symbol: P3
    meaning: Low priority
domain_extensions: null
lifecycle:
  current_stage: demo
  stage_history:
  - stage: demo
    started_at: '2026-03-27'
    milestones_completed: []
  stages:
    demo:
      name: Prototype Validation
      description: Quickly validate core concepts and feasibility
      focus:
      - Rapid iteration
      - Concept validation
      - Core features
      principles:
      - Fail fast, adjust fast
      - Prioritize core features, defer optimization
      - Technical debt is acceptable, but must be documented
      - Detailed Git development iteration records
      - Record important decisions in DECISIONS.md
      - Set up CI/CD
      milestones: []
    production:
      name: Production
      description: Productization development, preparing for scale
      focus:
      - Stability
      - Performance optimization
      - Maintainability
      principles:
      - Code quality first
      - Prepare for release and announcements, define and refine target platform support
      - Full code review before launch, build more stable and robust code structure
      - Complete QA product test coverage
      - Define performance standards
      - Unit tests, coding standards checks
      - Complete release platform standards
      milestones: []
    commercial:
      name: Commercialization
      description: Market-facing, pursuing growth
      focus:
      - User experience
      - Market adaptation
      - Scalability
      - Plugin-based incremental development
      - Data hot-update
      principles:
      - User feedback driven
      - Data-driven decisions
      - Fast market response
      milestones: []
    stable:
      name: Stable Operations
      description: Mature product, stable maintenance
      focus:
      - Stability
      - Maintenance cost
      - Long-term planning
      principles:
      - Changes require caution
      - Backward compatibility first
      - Complete documentation
      milestones: []
