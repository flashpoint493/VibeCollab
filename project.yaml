# LLM Collaboration Protocol - Project Configuration Template
# Use this template to configure your project, then generate CONTRIBUTING_AI.md via the generator

# ============================================
# Project Basic Information
# ============================================
project:
  name: "VibeCollab"
  version: "v0.10.11"
  domain: "generic"  # game/web/mobile/data/infra/generic
  description: "Configurable AI collaboration protocol framework with built-in knowledge capture and MCP Server"

# ============================================
# Philosophy
# ============================================
philosophy:
  vibe_development:
    enabled: true
    principles:
      - "AI is not an executor but a collaboration partner"
      - "Don't rush to produce code -- first align understanding"
      - "Every decision is a result of shared thinking"
      - "The conversation itself is part of the design process"
  decision_quality:
    target_rate: 0.9
    critical_tolerance: 0
  long_term_dialogue: true

# ============================================
# Role Definitions
# ============================================
roles:
  - code: "DESIGN"
    name: "Product Design"
    focus: ["requirements", "experience", "interaction"]
    triggers: ["design", "requirements", "product"]
    is_gatekeeper: false

  - code: "ARCH"
    name: "Architecture"
    focus: ["infrastructure", "performance", "extensibility"]
    triggers: ["architecture", "infrastructure", "refactor"]
    is_gatekeeper: false

  - code: "DEV"
    name: "Development"
    focus: ["implementation", "bug fixing"]
    triggers: ["develop", "implement", "code"]
    is_gatekeeper: false

  - code: "PM"
    name: "Project Management"
    focus: ["milestones", "priorities", "progress"]
    triggers: ["plan", "schedule", "priority"]
    is_gatekeeper: false

  - code: "QA"
    name: "Product Quality Assurance"
    focus: ["acceptance testing", "user experience validation", "edge cases"]
    triggers: ["acceptance", "experience testing", "feature verification"]
    is_gatekeeper: true

  - code: "TEST"
    name: "Unit Testing"
    focus: ["code testing", "coverage", "automated testing"]
    triggers: ["unit test", "test case", "coverage"]
    is_gatekeeper: false

# ============================================
# Decision Levels
# ============================================
decision_levels:
  - level: "S"
    name: "Strategic Decision"
    scope: "Overall direction, core features"
    review:
      required: true
      mode: "sync"
      human_confirm: true

  - level: "A"
    name: "Architecture Decision"
    scope: "System design, data structures"
    review:
      required: true
      mode: "async"
      human_confirm: true

  - level: "B"
    name: "Implementation Decision"
    scope: "Specific approach selection"
    review:
      required: false
      mode: "auto"
      human_confirm: false

  - level: "C"
    name: "Detail Decision"
    scope: "Parameters, naming, formatting"
    review:
      required: false
      mode: "none"
      human_confirm: false

# ============================================
# Task Unit
# ============================================
task_unit:
  id_pattern: "TASK-{role}-{seq}"
  statuses:
    - "TODO"
    - "IN_PROGRESS"
    - "REVIEW"
    - "DONE"
  required_fields:
    - "id"
    - "role"
    - "feature"
    - "dependencies"
    - "output"
    - "status"
    - "dialogue_rounds"

# ============================================
# Dialogue Protocol
# ============================================
dialogue_protocol:
  on_start:
    read_files:
      - "docs/CONTEXT.md"
      - "CONTRIBUTING_AI.md"
    actions:
      - "Understand current progress"
      - "Confirm user's goal for this conversation"

  on_end:
    update_files:
      - "docs/CONTEXT.md"
      - "docs/CHANGELOG.md"
    git_commit: true

  standard_flow:
    - step: 1
      actor: "human"
      action: "Raise a requirement or question"
    - step: 2
      actor: "ai"
      action: "Identify role, analyze the problem"
    - step: 3
      actor: "ai"
      action: "Request confirmation for S/A level decisions, execute B/C autonomously"
      condition: "decision_level in [S, A]"
    - step: 4
      actor: "ai"
      action: "Execute task, produce output"
    - step: 5
      actor: "ai"
      action: "Update test cases (if feature development)"
      condition: "task_type == feature"
    - step: 6
      actor: "ai"
      action: "Summarize progress, suggest next steps"
    - step: 7
      actor: "human"
      action: "Confirm / correct / continue"
    - step: 8
      actor: "ai"
      action: "Git commit record"

# ============================================
# Requirements Clarification Protocol
# ============================================
requirement_clarification:
  enabled: true
  trigger_conditions:
    - "Description is vague or incomplete"
    - "Missing specific acceptance criteria"
    - "Could be interpreted in multiple ways"
    - "Involves S/A level decisions"
  clarification_questions:
    - "What outcome are you hoping to achieve?"
    - "Do you have any reference examples?"
    - "Who will use this feature? In what scenario?"
    - "How would you verify this feature is complete?"
    - "Are there time or resource constraints?"

# ============================================
# Git Workflow
# ============================================
git_workflow:
  branches:
    main: "main"
    dev: "dev"
    feature_prefix: "feature/"
    fix_prefix: "fix/"
    design_prefix: "design/"
    refactor_prefix: "refactor/"

  commit_prefixes:
    - prefix: "design:"
      description: "Design document changes"
      roles: ["DESIGN"]
    - prefix: "arch:"
      description: "Architecture adjustments"
      roles: ["ARCH"]
    - prefix: "feat:"
      description: "New features"
      roles: ["DEV"]
    - prefix: "fix:"
      description: "Bug fixes"
      roles: ["DEV", "QA"]
    - prefix: "chore:"
      description: "Config adjustments (no logic changes)"
      roles: ["DEV"]
    - prefix: "refactor:"
      description: "Refactoring"
      roles: ["ARCH", "DEV"]
    - prefix: "docs:"
      description: "Documentation updates"
      roles: ["PM", "DESIGN"]
    - prefix: "test:"
      description: "Test related"
      roles: ["TEST", "QA"]
    - prefix: "ci:"
      description: "Collaboration workflow updates"
      roles: ["PM"]

  commit_required: true

# ============================================
# Testing
# ============================================
testing:
  # Unit Test (developer perspective - code correctness)
  unit_test:
    enabled: true
    framework: "pytest"
    coverage_target: 0.8
    patterns:
      - "tests/test_*.py"
    run_on:
      - "ci"
    required_for_merge: true

  # Product QA (user perspective - feature acceptance)
  product_qa:
    enabled: true
    test_case_file: "docs/QA_TEST_CASES.md"
    case_id_pattern: "TC-{module}-{seq}"
    required_fields:
      - "id"
      - "feature"
      - "precondition"
      - "steps"
      - "expected"
      - "status"
    statuses:
      - symbol: "🟢"
        meaning: "PASS"
      - symbol: "🟡"
        meaning: "PARTIAL"
      - symbol: "🔴"
        meaning: "FAIL"
      - symbol: "⚪"
        meaning: "SKIP"

# ============================================
# Milestone
# ============================================
milestone:
  lifecycle:
    - phase: "feature_dev"
      description: "Feature development period"
      exit_criteria:
        - "All planned features completed"
        - "Quick acceptance passed"

    - phase: "feature_freeze"
      description: "Feature freeze"
      exit_criteria:
        - "No new features added"
        - "Build successful"

    - phase: "bug_fix"
      description: "Bug fix period"
      exit_criteria:
        - "P0/P1 issues cleared"
        - "Test pass rate meets target"

    - phase: "acceptance"
      description: "Milestone acceptance"
      exit_criteria:
        - "QA full test pass"
        - "Unit test coverage meets target"
        - "Known issues cleared or deferred"

    - phase: "retrospective"
      description: "Version retrospective"
      exit_criteria:
        - "Review test performance"
        - "Collect user feedback"
        - "Add new requirements to next phase"

  tag_pattern: "v{major}.{minor}.{patch}"
  roadmap_file: "docs/ROADMAP.md"
  bug_priority:
    - level: "P0"
      description: "Crash / blocker"
    - level: "P1"
      description: "Feature malfunction"
    - level: "P2"
      description: "Experience issue"
    - level: "P3"
      description: "Optimization suggestion"

# ============================================
# Iteration Management
# ============================================
iteration:
  suggestion_pool:
    file: "docs/ROADMAP.md"
    section: "Iteration Suggestion Pool"
    categories:
      - symbol: "✅"
        meaning: "Include in current milestone"
      - symbol: "⏳"
        meaning: "Defer to next milestone"
      - symbol: "❌"
        meaning: "Reject (doesn't align with direction)"
      - symbol: "🔄"
        meaning: "Merge with other iteration"

  config_level_iteration:
    enabled: true
    commit_prefix: "chore:"
    skip_pm_review: true
    examples:
      - "Numeric parameter adjustments"
      - "Config file modifications"
      - "Style / theme changes"
      - "Copy / text modifications"

  review_dimensions:
    - "Dependency / conflict with current tasks"
    - "Impact on user experience"
    - "Development cost and technical complexity"
    - "Remaining time constraints for milestone"

# ============================================
# Version Review
# ============================================
version_review:
  enabled: true
  timing: "After milestone acceptance is complete"
  review_items:
    - "Test performance (pass rate, issue distribution)"
    - "User experience feedback"
    - "Technical debt"
    - "Iteration suggestion pool"

# ============================================
# Build Configuration
# ============================================
build:
  enabled: true
  command: "hatch build"
  dist_entry: "dist/"
  timing:
    - "Before milestone full acceptance"
    - "During bug fix period for concentrated testing"
    - "When preparing PyPI release"

# ============================================
# Quick Acceptance
# ============================================
quick_acceptance:
  enabled: true
  start_command: "pip install -e . && vibecollab check"
  reply_formats:
    pass: "✅"
    issue: "⚠️ Issue:"
    skip: "Skip"

# ============================================
# Prompt Engineering
# ============================================
prompt_engineering:
  enabled: true
  role_templates:
    DESIGN: |
      [DESIGN] I'd like to discuss the design of {system_name}
      Current thinking: {description}
      Main concerns: {concerns}
      Please analyze from a user experience perspective
    ARCH: |
      [ARCH] I need to design the architecture for {module_name}
      Requirements: {functional_requirements}
      Constraints: {performance_compatibility_constraints}
      Please provide 2-3 approaches for comparison
    DEV: |
      [DEV] Please implement {feature}
      Input: {input_description}
      Output: {expected_output}
      Related files: {file_paths}

# ============================================
# Confirmed Decisions (populated during project runtime)
# ============================================
confirmed_decisions: []
# Example:
# - id: "001"
#   title: "Technology framework selection"
#   choice: "React + TypeScript"
#   reason: "Team familiarity, mature ecosystem"

# ============================================
# Document Iteration Log (CONTRIBUTING_AI.md version history)
# ============================================
contributing_ai_changelog: []
# Example:
# - version: "v1.0"
#   date: "2026-01-20"
#   changes: "Initial version"

# ============================================
# Documentation
# ============================================
documentation:
  key_files:
    - path: "CONTRIBUTING_AI.md"
      purpose: "AI collaboration rules, top-level guidance"
      update_trigger: "When collaboration approach evolves"

    - path: "llms.txt"
      purpose: "Project context summary (llmstxt.org standard)"
      update_trigger: "When project info changes"

    - path: "docs/CONTEXT.md"
      purpose: "Current development context"
      update_trigger: "End of every conversation"

    - path: "docs/DECISIONS.md"
      purpose: "Important decision records"
      update_trigger: "After every S/A level decision"

    - path: "docs/CHANGELOG.md"
      purpose: "Version changelog"
      update_trigger: "After every productive conversation"

    - path: "docs/QA_TEST_CASES.md"
      purpose: "Product QA test cases"
      update_trigger: "When each feature is completed"

    - path: "docs/PRD.md"
      purpose: "Product requirements document"
      update_trigger: "When requirements change"

    - path: "docs/ROADMAP.md"
      purpose: "Roadmap + iteration suggestions"
      update_trigger: "During milestone planning / feedback"

  context_file: "docs/CONTEXT.md"
  changelog_file: "docs/CHANGELOG.md"
  decisions_file: "docs/DECISIONS.md"

# ============================================
# Multi-Developer Support (v0.5.0+)
# ============================================
multi_developer:
  enabled: false  # Disabled by default, enable via --multi-dev

  # Developer identity detection strategy
  identity:
    primary: "git_username"        # git_username / system_user / manual
    fallback: "system_user"        # Fallback when primary strategy fails
    normalize: true                # Normalize names (lowercase, replace spaces with underscores)

  # Context management
  context:
    per_developer_dir: "docs/developers"     # Per-developer context directory
    global_aggregation: true                 # Whether to generate global aggregated view
    aggregation_file: "docs/CONTEXT.md"      # Global aggregation file path
    metadata_file: ".metadata.yaml"          # Metadata file name
    auto_sync: true                          # Auto-trigger aggregation at conversation end

  # Collaboration management
  collaboration:
    enabled: true
    file: "docs/developers/COLLABORATION.md"
    track_dependencies: true       # Track task dependencies
    track_handoffs: true           # Track task handoffs

  # Dialogue protocol changes (in multi-developer mode)
  dialogue_protocol:
    on_start:
      read_files:
        - "docs/CONTEXT.md"                           # Read global aggregated view
        - "docs/developers/{role_code}/CONTEXT.md"    # Read own role context
        - "docs/developers/COLLABORATION.md"          # Read collaboration document
        - "CONTRIBUTING_AI.md"
    on_end:
      update_files:
        - "docs/developers/{role_code}/CONTEXT.md"    # Update own role context
        - "docs/CHANGELOG.md"                         # Update global CHANGELOG
      aggregate_context: true                         # Regenerate global aggregation
      git_commit: true

# ============================================
# Insight System (v0.7.0+)
# ============================================
insight:
  enabled: true  # Enabled by default; Insight system is the project's "organizational memory"

# ============================================
# Protocol Self-Check
# ============================================
protocol_check:
  enabled: true
  # Check item configuration
  checks:
    git:
      enabled: true
      check_uncommitted: true
      check_commit_frequency: true
    documentation:
      enabled: true
      check_file_existence: true
      check_update_frequency: true
      update_threshold_hours: 24
    dialogue:
      enabled: true
      check_required_files: true
  # Trigger words (used to trigger self-check in conversation)
  trigger_words:
    - "check protocol"
    - "protocol check"
    - "verify protocol compliance"
    - "self-check"

# ============================================
# PRD Management
# ============================================
prd_management:
  enabled: true
  prd_file: "docs/PRD.md"
  # Requirement status definitions
  requirement_statuses:
    - "draft"        # Draft
    - "confirmed"    # Confirmed
    - "in_progress"  # In progress
    - "completed"    # Completed
    - "cancelled"    # Cancelled
  # Priority definitions
  priorities:
    - "high"
    - "medium"
    - "low"
  # Trigger words (used to trigger PRD management in conversation)
  trigger_words:
    - "record requirement"
    - "update PRD"
    - "view requirements"
    - "requirement status"
    - "PRD"
    - "requirements document"

# ============================================
# Symbology System
# ============================================
symbology:
  decision_status:
    - symbol: "PENDING"
      meaning: "Pending confirmation"
    - symbol: "CONFIRMED"
      meaning: "Confirmed"
    - symbol: "REVISED"
      meaning: "Revised"

  task_status:
    - symbol: "TODO"
      meaning: "Not started"
    - symbol: "IN_PROGRESS"
      meaning: "In progress"
    - symbol: "REVIEW"
      meaning: "Pending review"
    - symbol: "DONE"
      meaning: "Completed"

  test_status:
    - symbol: "🟢"
      meaning: "Pass"
    - symbol: "🟡"
      meaning: "Partial pass"
    - symbol: "🔴"
      meaning: "Fail"
    - symbol: "⚪"
      meaning: "Skip"

  priority:
    - symbol: "P0"
      meaning: "Highest priority / blocker"
    - symbol: "P1"
      meaning: "High priority"
    - symbol: "P2"
      meaning: "Medium priority"
    - symbol: "P3"
      meaning: "Low priority"

