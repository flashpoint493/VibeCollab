name: Simple Release (Backfill)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version to release (e.g., v0.8.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  simple_test:
    name: Quick test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -e ".[dev]"
          vibecollab --help

      - name: Quick test
        run: pytest tests/ -q --tb=short -x || echo "Tests failed but continuing..."

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: simple_test
    if: github.event.inputs.create_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          body: |
            ## ${{ github.event.inputs.tag }}
            This is a backfilled release for version ${{ github.event.inputs.tag }}.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
